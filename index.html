<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>Genius Mind by JustFloow - Cognitive Infrastructure for Operators</title>
<meta name="description" content="You know exactly what you need to do. Your brain just won't let you start. Genius Mind is a 16-ingredient nootropic stack built for founders and operators who can't afford to drop a beat after 3pm.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ====================================================================
   GENIUS MIND × CHAOS OPERATOR - PRELANDER
   Dark premium aesthetic. Mobile-first. Inspired by Primal Queen
   structure, rebuilt in Genius Mind brand language.
   ==================================================================== */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
em, i, .italic, .serif { font-style: normal !important; }

:root {
  /* Brand kit colours */
  --bg: #0e1117;
  --surface: #161b22;
  --surface-2: #1c2129;
  --surface-3: #242a33;
  --cream: #f5f1e8;
  --cream-warm: #faf6ec;
  --paper: #fcfcfc;

  --teal: #00A6D2;
  --teal-warm: #33B8DD;
  --teal-glow: rgba(0, 166, 210, 0.18);
  --teal-soft: rgba(0, 166, 210, 0.08);

  --text: #ffffff;
  --text-dim: #c7c7d4;
  --text-mute: #8a8aa0;
  --text-faint: #5a5a6e;

  --text-dark: #0a0a0f;
  --text-dark-mute: #2a2a2a;

  --gold: #FFD700;
  --green: #22d3a0;
  --red: #E8283B;
  --teal: #00A6D2;

  --border: rgba(255,255,255,0.08);
  --border-teal: rgba(0,166,210,0.28);
  --border-strong: rgba(255,255,255,0.16);

  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 22px;
  --radius-xl: 32px;

  --shadow-sm: 0 2px 12px rgba(0,0,0,0.4);
  --shadow: 0 12px 40px rgba(0,0,0,0.5);
  --shadow-teal: 0 12px 40px rgba(0,166,210,0.35);

  --max: 1180px;
  --pad: clamp(20px, 4vw, 40px);
}

html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  font-size: 17px;
}

img { max-width: 100%; height: auto; display: block; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; font-family: inherit; background: none; color: inherit; }

.container { max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); }
.serif { font-family: 'EB Garamond', Garamond, 'Times New Roman', serif; }
.upper { text-transform: uppercase; letter-spacing: 0.04em; }
.center { text-align: center; }

/* ============================================================
   SHARED COMPONENTS
   ============================================================ */

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--teal-soft);
  border: 1px solid var(--border-teal);
  color: var(--teal-warm);
  font-size: 12px;
  font-weight: 700;
  padding: 8px 16px;
  border-radius: 50px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 22px;
}
.eyebrow::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 10px var(--teal);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.4); }
}

.h-display {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: clamp(34px, 5.6vw, 64px);
  line-height: 1.04;
  letter-spacing: -0.025em;
  text-transform: none;
}
.h-display em {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  text-transform: none;
  color: var(--teal);
  letter-spacing: -0.01em;
}

.h-editorial {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: clamp(28px, 4vw, 46px);
  line-height: 1.15;
  letter-spacing: -0.01em;
}

.h-section {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: clamp(28px, 4.4vw, 50px);
  line-height: 1.08;
  letter-spacing: -0.025em;
  text-transform: none;
}
.h-section em {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}

.subtitle {
  font-size: clamp(16px, 1.8vw, 19px);
  color: var(--text-dim);
  line-height: 1.6;
  max-width: 640px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: linear-gradient(135deg, #1bb88a 0%, #22d3a0 100%);
  color: #fff;
  font-weight: 700;
  font-size: 16px;
  padding: 16px 32px;
  border-radius: 60px;
  text-transform: none;
  letter-spacing: 0.01em;
  transition: all 0.25s ease;
  box-shadow: 0 6px 24px rgba(34,211,160,0.3);
  min-height: 52px;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 60%);
  opacity: 0;
  transition: opacity 0.25s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(34,211,160,0.4); }
.btn:hover::after { opacity: 1; }
.btn-arrow { font-size: 20px; transition: transform 0.25s; }
.btn:hover .btn-arrow { transform: translateX(4px); }

.btn-ghost {
  background: transparent;
  border: 1.5px solid var(--border-strong);
  color: var(--text);
  box-shadow: none;
}
.btn-ghost:hover { border-color: var(--teal); color: var(--teal); box-shadow: none; transform: none; }

.trust-pill-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-top: 22px;
}
.trust-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
}
.trust-pill .check { color: var(--teal); font-weight: 600; }

/* ============================================================
   STICKY HEADER (Brain.fm style)
   ============================================================ */
.sticky-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  background: rgba(14,17,23,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 0 var(--pad);
  height: 56px;
  display: flex;
  align-items: center;
}
.sticky-header__inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sticky-header__logo {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
}
.sticky-header__logo .infinity {
  color: var(--teal);
  font-size: 22px;
}
.sticky-header__cta {
  background: linear-gradient(135deg, #1bb88a 0%, #22d3a0 100%);
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  padding: 10px 22px;
  border-radius: 50px;
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  transition: all 0.2s ease;
  box-shadow: 0 4px 16px rgba(34,211,160,0.3);
}
.sticky-header__cta:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(34,211,160,0.4);
}
/* Old announce bar hidden */
.announce-bar { display: none !important; }

/* ============================================================
   SECTION 2 - HERO
   ============================================================ */
.hero {
  position: relative;
  padding: clamp(60px, 10vw, 120px) 0 clamp(40px, 5vw, 60px);
  background: var(--bg);
  overflow: hidden;
}
.hero-grid {
  position: relative;
  min-height: 520px;
  position: relative;
  z-index: 2;
}
.hero-content {
  max-width: 60%;
  position: relative;
  z-index: 2;
}
.hero h1 {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: clamp(42px, 6.5vw, 78px);
  line-height: 1.05;
  letter-spacing: -0.03em;
  text-transform: none;
  margin-bottom: 24px;
}
/* Hero rotating word - Brain.fm style with highlight block */
.hero-rotate {
  display: block;
  position: relative;
  height: 1.15em;
  overflow: hidden;
  margin-top: 0.1em;
}
.hero-rotate__word {
  display: inline-block;
  color: #fff;
  position: absolute;
  left: 0;
  top: 0;
  white-space: nowrap;
  opacity: 0;
  transform: translateY(100%);
  transition: opacity 0.65s ease, transform 0.65s ease;
  padding: 0 0.15em;
  background: linear-gradient(135deg, #00A6D2, #0088b0);
  border-radius: 6px;
}
.hero-rotate__word.active {
  opacity: 1;
  transform: translateY(0);
  position: relative;
}
.hero-rotate__word.exit {
  opacity: 0;
  transform: translateY(-100%);
}
.hero-subtitle {
  font-size: clamp(17px, 1.9vw, 21px);
  color: var(--text-dim);
  max-width: 520px;
  margin-bottom: 32px;
  line-height: 1.5;
}
.hero p.lede {
  font-family: 'Inter', sans-serif;
  font-size: clamp(17px, 1.9vw, 21px);
  line-height: 1.55;
  color: var(--text-dim);
  max-width: 560px;
  margin-bottom: 28px;
}
.hero-cta-row {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 18px;
}
/* Hero trust strip - moved below hero */
.hero-trust-strip {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 0;
}
.hero-trust-strip__inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  flex-wrap: wrap;
}
.hero-trust-strip .stars-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
}
.hero-trust-strip .stars-row .stars { color: var(--gold); letter-spacing: 2px; font-size: 14px; }
.hero-trust-strip .stars-row strong { color: var(--text); }
.hero-trust-strip .trust-pill {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-mute);
  display: flex;
  align-items: center;
  gap: 6px;
}
.hero-trust-strip .trust-pill .check {
  color: var(--teal);
  font-size: 13px;
}
.hero-trust-strip__sep {
  width: 1px;
  height: 16px;
  background: var(--border);
}

/* Hero portrait card - absolutely positioned so text changes can't move it */
.hero-portrait {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 34%;
  aspect-ratio: 3/4;
  border-radius: 24px;
  background: var(--surface-2);
  border: 1px solid rgba(255,255,255,0.06);
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
/* Radial glow behind portrait */
.hero-portrait::before {
  content: '';
  position: absolute;
  top: -80px; left: -80px; right: -80px; bottom: -80px;
  background: radial-gradient(circle at 50% 45%, rgba(0,166,210,0.2), rgba(0,166,210,0.05) 45%, transparent 70%);
  filter: blur(40px);
  z-index: -1;
  pointer-events: none;
}
.hero-portrait .placeholder-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-mute);
  letter-spacing: 0.05em;
  padding: 30px;
  line-height: 1.5;
}
.hero-portrait img.portrait-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
}
.hero-portrait .portrait-tag {
  position: absolute;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border-strong);
  color: var(--text);
  padding: 10px 22px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  z-index: 3;
}
.hero-portrait .floating-badge {
  position: absolute;
  top: 24px;
  right: -10px;
  width: 96px;
  height: 96px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00A6D2 0%, #33B8DD 100%);
  color: #0a0a0f;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 13px;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  line-height: 1.05;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 4px rgba(0,166,210,0.15);
  transform: rotate(-12deg);
  z-index: 4;
}
.hero-portrait .product-overlay {
  position: absolute;
  bottom: -30px; right: -20px;
  width: 140px;
  z-index: 2;
  filter: drop-shadow(0 12px 24px rgba(0,0,0,0.6));
  pointer-events: none;
}
@media (max-width: 900px) {
  .hero-grid { min-height: auto; }
  .hero-content { max-width: 100%; }
  .hero-portrait { position: relative; width: 100%; max-width: 360px; margin: 30px auto 0; right: auto; top: auto; }
  .hero h1 { font-size: clamp(34px, 8vw, 48px); }
}

/* ============================================================
   HERO BENEFITS SCROLLER (Brain.fm style)
   ============================================================ */
.hero-scroller {
  background: var(--surface-2);
  border-top: 1px solid rgba(255,255,255,0.08);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 0;
  position: relative;
  overflow: hidden;
  max-width: 860px;
  margin: 0 auto;
  border-radius: 60px;
}
.hero-scroller__inner {
  display: flex;
  align-items: center;
}
.hero-scroller__arrow { display: none; }
.hero-scroller__track {
  display: flex;
  gap: 0;
  animation: scroll-scroller 30s linear infinite;
  white-space: nowrap;
}
@keyframes scroll-scroller {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
/* Fade edges */
.hero-scroller::before, .hero-scroller::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 60px;
  z-index: 2;
  pointer-events: none;
}
.hero-scroller::before { left: 0; background: linear-gradient(90deg, var(--surface-2), transparent); }
.hero-scroller::after { right: 0; background: linear-gradient(-90deg, var(--surface-2), transparent); }
.hero-scroller__item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 20px;
  color: rgba(255,255,255,0.85);
  font-weight: 700;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
  flex-shrink: 0;
}
.hero-scroller__item svg {
  width: 16px; height: 16px;
  opacity: 0.5;
  flex-shrink: 0;
}
@media (max-width: 900px) {
  .hero-scroller { max-width: 100%; border-radius: 0; }
}

/* ============================================================
   SOCIAL PROOF SECTION (Brain.fm layout: left text + right cards)
   ============================================================ */
.social-proof-section {
  padding: clamp(40px, 5vw, 60px) 0;
  background: var(--bg);
  overflow: hidden;
}
.social-proof__grid {
  display: grid;
  grid-template-columns: 0.45fr 0.55fr;
  gap: clamp(40px, 5vw, 80px);
  align-items: center;
}
.social-proof__left {}
.social-proof__left h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(36px, 5vw, 64px);
  color: #fff;
  line-height: 1.0;
  letter-spacing: -0.03em;
  margin-bottom: 20px;
}
.social-proof__left h2 em {
  font-style: italic;
  color: var(--teal-warm);
  background: none;
}
.social-proof__left p {
  font-size: 17px;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 32px;
}
.social-proof__featured-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-mute);
  margin-bottom: 18px;
}
.social-proof__logos {
  display: flex;
  align-items: center;
  gap: clamp(20px, 3vw, 40px);
  flex-wrap: wrap;
  opacity: 0.35;
}
.social-proof__logos span {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(16px, 2vw, 22px);
  color: #fff;
}
/* Right side - stacked/offset cards */
.social-proof__cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 16px;
  position: relative;
}
.social-proof__cards .dark-review:nth-child(1) {
  grid-column: 1;
  grid-row: 1;
}
.social-proof__cards .dark-review:nth-child(2) {
  grid-column: 2;
  grid-row: 1 / 3;
  align-self: center;
}
.social-proof__cards .dark-review:nth-child(3) {
  grid-column: 1;
  grid-row: 2;
}
@media (max-width: 800px) {
  .social-proof__grid { grid-template-columns: 1fr; }
  .social-proof__cards {
    grid-template-columns: 1fr;
    max-width: 480px;
    margin: 0 auto;
  }
  .social-proof__cards .dark-review:nth-child(2) {
    grid-column: 1;
    grid-row: auto;
  }
}
.dark-review {
  background: linear-gradient(145deg, #1c2129, #161b22);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 24px;
}
.dark-review__header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.dark-review__avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--surface-3);
  overflow: hidden;
  flex-shrink: 0;
}
.dark-review__avatar img {
  width: 100%; height: 100%; object-fit: cover;
}
.dark-review__user { flex-grow: 1; }
.dark-review__name {
  font-weight: 700;
  font-size: 15px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 4px;
}
.dark-review__verified {
  display: inline-flex;
  width: 18px; height: 18px;
  background: #1d9bf0;
  border-radius: 50%;
  align-items: center;
  justify-content: center;
}
.dark-review__verified svg { width: 12px; height: 12px; fill: #fff; }
.dark-review__handle {
  font-size: 13px;
  color: var(--text-mute);
}
.dark-review__body {
  font-size: 15px;
  line-height: 1.55;
  color: var(--text-dim);
}
.dark-review__highlight {
  color: var(--teal);
  font-weight: 600;
}
@media (max-width: 800px) {
  .dark-reviews__grid { grid-template-columns: 1fr; max-width: 480px; margin: 0 auto; }
}

/* ============================================================
   6 BRAIN SYSTEMS (tabbed, IM8 style)
   ============================================================ */
.brain-systems {
  padding: clamp(40px, 5vw, 60px) 0;
  background: var(--bg);
}
.brain-systems__head {
  text-align: center;
  margin-bottom: 36px;
}
.brain-systems__head h2 {
  font-weight: 600;
  font-size: clamp(28px, 4vw, 46px);
  color: #fff;
  margin-bottom: 12px;
}
.brain-systems__head p {
  font-size: 17px;
  color: var(--text-dim);
  max-width: 560px;
  margin: 0 auto;
}
.brain-systems__pills {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 28px;
}
.brain-pill {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 14px;
  font-weight: 600;
  padding: 10px 20px;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.brain-pill:hover { border-color: var(--teal); color: #fff; }
.brain-pill.active {
  background: var(--teal);
  border-color: var(--teal);
  color: #fff;
}
.brain-pill__icon { font-size: 16px; }
.brain-systems__panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  max-width: 700px;
  margin: 0 auto;
  transition: opacity 0.3s;
}
.brain-panel__header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.brain-panel__icon { font-size: 28px; }
.brain-panel__name {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
}
.brain-panel__desc {
  font-size: 16px;
  color: var(--text-dim);
  line-height: 1.6;
}
.brain-systems__footer {
  text-align: center;
  margin-top: 24px;
  font-size: 14px;
  color: var(--text-mute);
}

/* ============================================================
   VIDEO REVIEWS SECTION (kept but hidden)
   ============================================================ */
.video-reviews {
  padding: clamp(40px, 5vw, 60px) 0;
  background: var(--bg);
}
.video-reviews__head {
  text-align: center;
  margin-bottom: 40px;
}
.video-reviews__head h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(28px, 4vw, 46px);
  color: #fff;
  margin-bottom: 12px;
}
.video-reviews__head h2 em { font-style: normal; color: var(--teal); }
.video-reviews__head p {
  font-size: 17px; color: var(--text-dim); max-width: 500px; margin: 0 auto;
}
.video-reviews__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.video-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}
.video-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.3);
}
.video-card__thumb {
  position: relative;
  aspect-ratio: 16/10;
  background: var(--surface-2);
  overflow: hidden;
}
.video-card__thumb img {
  width: 100%; height: 100%; object-fit: cover;
}
.video-card__play {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  transition: transform 0.3s;
}
.video-card:hover .video-card__play { transform: translate(-50%, -50%) scale(1.1); }
.video-card__info {
  padding: 16px 18px;
}
.video-card__name {
  font-weight: 700;
  font-size: 15px;
  color: #fff;
  margin-bottom: 4px;
}
.video-card__title {
  font-size: 13px;
  color: var(--text-dim);
}
@media (max-width: 700px) {
  .video-reviews__grid { grid-template-columns: 1fr; max-width: 400px; margin: 0 auto; }
}

/* Old marquee styles kept for compat */
.marquee { display: none; }
.marquee span {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  color: var(--text-dim);
  font-weight: 500;
  font-size: 15px;
  text-transform: none;
  letter-spacing: 0.02em;
  font-style: italic;
}
.marquee span::before {
  content: '·';
  color: var(--teal);
  font-size: 20px;
  font-style: normal;
}

/* ============================================================
   SECTION 4 - STAT STRIP (by the numbers)
   ============================================================ */
.stat-strip {
  padding: clamp(28px, 4vw, 44px) 0;
  background: #fff;
  border-bottom: none;
}
/* Shimmer effect on stat numbers */
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
.stat-strip__number {
  background: linear-gradient(90deg, #00A6D2 0%, #33B8DD 25%, #8be0f5 50%, #33B8DD 75%, #00A6D2 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s linear infinite;
}
.stat-strip__grid {
  display: flex;
  justify-content: center;
  gap: 0;
  text-align: center;
}
.stat-strip__item {
  flex: 1;
  max-width: 200px;
  padding: 0 20px;
  border-right: 1px solid rgba(0,0,0,0.1);
}
.stat-strip__item:last-child { border-right: none; }
.stat-strip__number {
  font-family: 'Inter', sans-serif;
  font-size: clamp(28px, 4vw, 40px);
  font-weight: 600;
  color: var(--teal);
  line-height: 1;
  letter-spacing: -0.02em;
}
.stat-strip__label {
  font-size: 11px;
  font-weight: 600;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 6px;
}
@media (max-width: 800px) {
  .stat-strip__grid { flex-wrap: wrap; }
  .stat-strip__item { flex: 0 0 50%; max-width: none; padding: 12px 20px; border-right: none; }
  .stat-strip__item:nth-child(1), .stat-strip__item:nth-child(2) { border-bottom: 1px solid rgba(0,0,0,0.1); }
}

/* ============================================================
   SECTION 4b - FOUNDER (condensed pull-quote)
   ============================================================ */
.founder {
  padding: clamp(40px, 5vw, 60px) 0;
  background: var(--cream);
  color: var(--text-dark);
  position: relative;
}
.founder-grid {
  display: grid;
  grid-template-columns: 0.85fr 1.15fr;
  gap: clamp(30px, 5vw, 60px);
  align-items: center;
}
.founder-photo {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: linear-gradient(135deg, #2a2a3a 0%, #1a1a24 100%);
  aspect-ratio: 3/4;
  box-shadow: var(--shadow);
}
.founder-photo .placeholder-label {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  text-align: center; color: rgba(255,255,255,0.4); font-size: 13px; padding: 24px; font-weight: 600;
}
.founder-photo .photo-caption {
  position: absolute; bottom: 18px; left: 18px;
  background: rgba(10,10,15,0.85); backdrop-filter: blur(8px); color: #fff;
  padding: 10px 18px; border-radius: 50px; font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.founder-content h2 {
  font-family: 'Inter', sans-serif; font-weight: 600;
  font-size: clamp(32px, 4.5vw, 52px); line-height: 1.05;
  letter-spacing: -0.02em; margin-bottom: 8px; color: var(--text-dark);
}
.founder-content h2 em { font-style: normal; font-weight: 500; color: var(--teal); }
.founder-content p.intro {
  font-size: 19px; color: var(--text-dark-mute); margin-bottom: 24px;
}
.founder-content .body p {
  font-size: 17px; line-height: 1.65; color: var(--text-dark-mute); margin-bottom: 14px;
}
.founder-content .body p strong { color: var(--text-dark); font-weight: 700; }
@media (max-width: 800px) {
  .founder-grid { grid-template-columns: 1fr; }
  .founder-photo { max-width: 360px; margin: 0 auto 24px; min-height: 300px; }
}

/* ============================================================
   SECTION 5 - DATA-LED FEATURE BLOCKS (replaces why-built + problem)
   ============================================================ */
.feature-blocks {
  padding: clamp(40px, 5vw, 60px) 0;
  background: var(--bg);
}
.feature-block {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(30px, 4vw, 60px);
  align-items: center;
  padding: clamp(40px, 5vw, 60px) 0;
  border-bottom: 1px solid var(--border);
}
.feature-block:last-child { border-bottom: none; }
.feature-block--reverse { direction: rtl; }
.feature-block--reverse > * { direction: ltr; }
.feature-block__content {}
.feature-block__stat {
  font-family: 'Inter', sans-serif;
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 600;
  color: var(--teal);
  line-height: 1;
  letter-spacing: -0.03em;
  margin-bottom: 12px;
}
.feature-block__title {
  font-family: 'Inter', sans-serif;
  font-size: clamp(22px, 3vw, 32px);
  font-weight: 600;
  color: var(--text);
  margin-bottom: 18px;
  line-height: 1.15;
}
.feature-block__bullets {
  list-style: none;
  padding: 0;
}
.feature-block__bullets li {
  font-size: 16px;
  color: var(--text-dim);
  line-height: 1.55;
  padding: 8px 0 8px 28px;
  position: relative;
}
.feature-block__bullets li::before {
  content: '';
  position: absolute;
  left: 0; top: 14px;
  width: 8px; height: 8px;
  background: var(--teal);
  border-radius: 50%;
}
/* Feature block chart/visual */
.feature-block__visual {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: clamp(24px, 3vw, 40px);
  position: relative;
  overflow: hidden;
}
/* Mini line chart (cognitive decline) */
.mini-chart { position: relative; height: 200px; }
.mini-chart__title {
  font-size: 12px; font-weight: 600; color: var(--text-mute);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px;
}
.mini-chart svg { width: 100%; height: 160px; }
/* SVG draw animation */
.chart-draw path[stroke], .chart-draw line[stroke] {
  stroke-dasharray: 2000;
  stroke-dashoffset: 2000;
}
.chart-draw.drawn path[stroke], .chart-draw.drawn line[stroke] {
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 2s ease-out;
}
.chart-draw path[fill]:not([fill="none"]), .chart-draw rect[fill] {
  opacity: 0;
}
.chart-draw.drawn path[fill]:not([fill="none"]), .chart-draw.drawn rect[fill] {
  opacity: 1;
  transition: opacity 1.5s ease-out 0.8s;
}
.chart-draw circle {
  opacity: 0;
  transform: scale(0);
  transform-origin: center;
}
.chart-draw.drawn circle {
  opacity: 1;
  transform: scale(1);
  transition: opacity 0.4s ease-out 1.2s, transform 0.4s ease-out 1.2s;
}
.chart-draw text {
  opacity: 0;
}
.chart-draw.drawn text {
  opacity: 1;
  transition: opacity 0.6s ease-out 1.5s;
}
/* Comp bar fill animation */
.comp-bar__fill {
  width: 0 !important;
  transition: width 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s;
}
.comp-bars-drawn .comp-bar__fill {
  width: var(--target-width) !important;
}
.mini-chart__labels {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--text-mute); margin-top: 8px;
}
/* Comparison bars */
.comp-bars {}
.comp-bars__title {
  font-size: 12px; font-weight: 600; color: var(--text-mute);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px;
}
.comp-bar {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.comp-bar__label {
  font-size: 13px; font-weight: 600; color: var(--text-dim);
  width: 110px; flex-shrink: 0; text-align: right;
}
.comp-bar__track {
  flex: 1; height: 28px; background: rgba(255,255,255,0.04);
  border-radius: 6px; overflow: hidden; position: relative;
}
.comp-bar__fill {
  height: 100%; border-radius: 6px;
  transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.comp-bar__fill--gm { background: linear-gradient(90deg, var(--teal), var(--teal-warm)); }
.comp-bar__fill--coffee { background: #8B6F47; }
.comp-bar__fill--adderall { background: #9B59B6; }
.comp-bar__fill--generic { background: #5a5a6e; }
.comp-bar__value {
  font-size: 12px; font-weight: 700; color: var(--text);
  width: 36px; flex-shrink: 0;
}
/* Tabs visual */
.tabs-visual {
  text-align: center;
}
.tabs-visual__img {
  font-size: 64px; margin-bottom: 16px; line-height: 1;
}
.tabs-visual__caption {
  font-size: 14px; color: var(--text-dim); font-style: italic;
}
@media (max-width: 800px) {
  .feature-block { grid-template-columns: 1fr; }
  .feature-block--reverse { direction: ltr; }
}

/* ============================================================
   SECTION 7 - COMPARISON TABLE (IM8 style)
   ============================================================ */
.comp-table-section {
  padding: clamp(40px, 5vw, 60px) 0;
  background: var(--cream);
  color: var(--text-dark);
}
.comp-table-section__head {
  text-align: center;
  margin-bottom: 50px;
}
.comp-table-section__head h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(26px, 3.5vw, 42px);
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--text-dark);
  margin-bottom: 14px;
}
.comp-table-section__head h2 em { font-style: normal; font-weight: 500; color: var(--teal); }
.comp-table-section__head p {
  font-size: 17px; color: var(--text-dark-mute); max-width: 600px; margin: 0 auto;
}
.comp-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: 0 4px 20px rgba(0,0,0,0.04);
}
.comp-table th, .comp-table td {
  padding: 16px 20px;
  text-align: center;
  font-size: 14px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  vertical-align: middle;
}
.comp-table td:first-child { text-align: left; }
.comp-table thead th {
  background: #f8f9fa;
  font-weight: 700;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-dark-mute);
  text-align: center;
  vertical-align: bottom;
  padding: 20px 16px;
}
.comp-table thead th:nth-child(2) {
  color: var(--teal);
  font-weight: 600;
}
.comp-table tbody tr:last-child td { border-bottom: none; }
.comp-table tbody tr:nth-child(even) { background: #fafbfc; }
.comp-table .ct-ingredient {
  font-weight: 600;
  color: var(--text-dark);
}
.comp-table .ct-check {
  color: var(--teal);
  font-weight: 700;
  font-size: 16px;
}
.comp-table .ct-cross {
  color: #ccc;
  font-weight: 700;
  font-size: 16px;
}
.comp-table .ct-dose {
  font-weight: 700;
  color: var(--text-dark);
}
.comp-table .ct-note {
  font-size: 12px;
  color: var(--text-dark-mute);
  display: block;
  text-align: center;
}
.comp-table .ct-diff {
  display: inline-block;
  background: rgba(0,166,210,0.1);
  color: var(--teal);
  font-weight: 700;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 50px;
  margin-left: 6px;
}
.comp-table .ct-other-dose {
  color: var(--text-dark-mute);
}
@media (max-width: 700px) {
  .comp-table th, .comp-table td { padding: 12px 10px; font-size: 12px; }
  .comp-table .ct-diff { display: none; }
}

/* ============================================================
   SECTION 8 - BRAND PROMISE BADGES
   ============================================================ */
.promise {
  display: none !important;
  padding: clamp(40px, 5vw, 70px) 0;
  background: var(--cream);
  color: var(--text-dark);
  border-top: 1px solid rgba(0,0,0,0.06);
}
.promise h3 {
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(22px, 3vw, 34px);
  letter-spacing: -0.02em;
  margin-bottom: 32px;
  color: var(--text-dark);
  text-transform: uppercase;
}
.promise h3 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}
.promise-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 14px;
}
.promise-badge {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 18px 10px;
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid rgba(0,0,0,0.06);
  text-align: center;
  transition: transform 0.25s, box-shadow 0.25s;
}
.promise-badge:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.08); }
.promise-badge .ring {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: transparent;
  border: 1.5px solid rgba(0,0,0,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dark);
  font-weight: 600;
  font-size: 18px;
}
.promise-badge .ring svg { width: 26px; height: 26px; }
.promise-badge .label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-dark);
}
@media (max-width: 800px) {
  .promise-row { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 460px) {
  .promise-row { grid-template-columns: repeat(2, 1fr); }
}

/* ============================================================
   SECTION 9 - FACILITY (oval framed)
   ============================================================ */
.facility {
  padding: clamp(40px, 5vw, 60px) 0;
  background: var(--cream);
  color: var(--text-dark);
  text-align: center;
}
.facility h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(32px, 5vw, 56px);
  letter-spacing: -0.03em;
  margin-bottom: 40px;
  color: var(--text-dark);
  text-transform: none;
  line-height: 1.05;
}
.facility h2 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}
.facility-frame {
  max-width: 460px;
  aspect-ratio: 4/5;
  margin: 0 auto;
  border-radius: 50% / 42%;
  background: linear-gradient(135deg, #2a2a3a, #0a0a0f);
  border: 3px solid var(--teal);
  box-shadow: 0 24px 60px rgba(0,166,210,0.2);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  font-weight: 600;
  padding: 30px;
  text-align: center;
}
.facility-trust {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 30px;
  flex-wrap: wrap;
}
.facility-trust span {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: clamp(18px, 2.5vw, 24px);
  font-weight: 600;
  color: var(--text-dark);
}
.facility-trust .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--teal);
  display: inline-block;
}

/* ============================================================
   SECTION 10 - RESULTS LINE GRAPH
   ============================================================ */
.results-graph {
  padding: clamp(40px, 5vw, 60px) 0;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.results-graph::before {
  content: '';
  position: absolute;
  top: 0; right: -150px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,166,210,0.1), transparent 60%);
  filter: blur(50px);
}
.results-graph__head {
  text-align: center; margin-bottom: 50px; position: relative; z-index: 2;
}
.results-graph__head h2 {
  font-family: 'Inter', sans-serif; font-weight: 700;
  font-size: clamp(30px, 4.4vw, 50px); letter-spacing: -0.025em; margin-bottom: 16px;
}
.results-graph__head h2 em { font-style: normal; font-weight: 500; color: var(--teal); }
.results-graph__head p {
  font-size: 17px; color: var(--text-dim); max-width: 560px; margin: 0 auto;
}
.results-graph__chart {
  position: relative; z-index: 2;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: clamp(24px, 4vw, 48px);
  max-width: 800px;
  margin: 0 auto;
}
.results-graph__chart svg { width: 100%; height: auto; }
.results-graph__annotations {
  display: flex; justify-content: space-between; flex-wrap: wrap;
  gap: 12px; margin-top: 24px;
}
.results-graph__note {
  flex: 1; min-width: 140px;
  text-align: center; padding: 12px;
  background: rgba(0,166,210,0.06);
  border: 1px solid var(--border-teal);
  border-radius: 8px;
}
.results-graph__note-period {
  font-size: 11px; font-weight: 700; color: var(--teal);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
}
.results-graph__note-text {
  font-size: 13px; color: var(--text-dim); font-weight: 500;
}
.results-graph__disclaimer {
  text-align: center; margin-top: 20px;
  font-size: 12px; color: var(--text-mute); font-style: italic;
}

/* ============================================================
   SECTION 11 - REVIEWS
   ============================================================ */
.reviews {
  padding: clamp(40px, 5vw, 60px) 0;
  background: var(--cream);
  color: var(--text-dark);
}
.reviews-head { text-align: center; margin-bottom: 16px; }
.reviews-head h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(28px, 4vw, 46px);
  letter-spacing: -0.025em;
  margin-bottom: 14px;
  color: var(--text-dark);
}
.reviews-head h2 em { font-style: normal; font-weight: 500; color: var(--teal); }
.reviews-head p { font-size: 17px; color: var(--text-dark-mute); }
/* Trustpilot badge bar */
.tp-badge {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 18px 28px;
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  max-width: 420px;
  margin: 0 auto 40px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.tp-badge__label {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-dark);
}
.tp-badge__stars {
  display: flex;
  gap: 3px;
}
.tp-badge__star {
  width: 28px; height: 28px;
  background: #00b67a;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tp-badge__star svg { width: 16px; height: 16px; fill: #fff; }
.tp-badge__meta {
  font-size: 13px;
  color: var(--text-dark-mute);
  text-align: center;
  margin-top: 8px;
}
.tp-badge__tp-logo {
  display: flex;
  align-items: center;
  gap: 4px;
  font-weight: 700;
  font-size: 14px;
  color: var(--text-dark);
}
.tp-badge__tp-logo svg { width: 20px; height: 20px; }
/* Review grid */
.reviews-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}
.review-card {
  background: #fff;
  border-radius: 12px;
  padding: 22px 20px 18px;
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  display: flex;
  flex-direction: column;
}
.review-card .tp-stars {
  display: flex;
  gap: 2px;
  margin-bottom: 12px;
}
.review-card .tp-star {
  width: 22px; height: 22px;
  background: #00b67a;
  display: flex;
  align-items: center;
  justify-content: center;
}
.review-card .tp-star svg { width: 13px; height: 13px; fill: #fff; }
.review-card .rc-meta {
  font-size: 12px;
  color: var(--text-dark-mute);
  margin-bottom: 10px;
}
.review-card .rc-meta strong {
  color: var(--text-dark);
  font-weight: 600;
}
.review-card .title {
  font-weight: 700;
  font-size: 15px;
  color: var(--text-dark);
  margin-bottom: 8px;
  line-height: 1.3;
}
.review-card .body {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-dark-mute);
  flex-grow: 1;
}
@media (max-width: 1000px) {
  .reviews-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .reviews-grid { grid-template-columns: 1fr; }
}

/* X/Reddit styles removed - now using Trustpilot style */

/* ============================================================
   SECTION 12 - HOW TO USE (3 steps)
   ============================================================ */
.howto {
  padding: clamp(40px, 5vw, 60px) 0;
  background: var(--cream);
  color: var(--text-dark);
  border-top: 1px solid rgba(0,0,0,0.06);
}
.howto h2 {
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(28px, 4vw, 46px);
  letter-spacing: -0.025em;
  margin-bottom: 12px;
  text-transform: none;
}
.howto h2 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}
.howto p.sub {
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  color: var(--text-dark-mute);
  margin-bottom: 50px;
}
.howto-steps {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.howto-step {
  text-align: center;
}
.howto-img {
  aspect-ratio: 1/1;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, #2a2a3a, #1a1a24);
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.4);
  font-size: 12px;
  font-weight: 600;
  padding: 18px;
}
.howto-img .step-num {
  position: absolute;
  top: 14px;
  left: 14px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--teal), var(--teal-warm));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 16px;
  z-index: 2;
}
.howto-step h4 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 18px;
  color: var(--text-dark);
  margin-bottom: 6px;
  text-transform: none;
  letter-spacing: -0.01em;
}
.howto-step p {
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  color: var(--text-dark-mute);
}
@media (max-width: 800px) { .howto-steps { grid-template-columns: 1fr; } }

/* ============================================================
   SECTION 13 - COMPARISON TABLE
   ============================================================ */
.comparison {
  padding: clamp(40px, 5vw, 60px) 0;
  background: var(--bg);
}
.comparison-head { text-align: center; margin-bottom: 40px; }
.comparison-head h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(28px, 4vw, 46px);
  letter-spacing: -0.025em;
  margin-bottom: 14px;
  text-transform: none;
}
.comparison-head h2 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}
.comparison-head p { font-family: 'Inter', sans-serif; font-size: 18px; color: var(--text-dim); }

.comparison-table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  background: var(--surface);
  border: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
}
.comparison-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 640px;
}
.comparison-table th, .comparison-table td {
  padding: 18px 20px;
  text-align: center;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
}
.comparison-table th {
  background: var(--surface-2);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 12px;
  color: var(--text-dim);
}
.comparison-table th.us {
  background: linear-gradient(135deg, rgba(0,166,210,0.18), rgba(51,184,221,0.08));
  color: var(--teal-warm);
  border-bottom: 2px solid var(--teal);
}
.comparison-table td:first-child, .comparison-table th:first-child {
  text-align: left;
  font-weight: 600;
  color: var(--text);
}
.comparison-table td.us {
  background: rgba(0,166,210,0.06);
  color: var(--teal);
  font-weight: 600;
}
.comparison-table .check { color: var(--teal); font-size: 18px; font-weight: 600; }
.comparison-table .x { color: var(--text-faint); font-size: 16px; }
.comparison-table tr:last-child td { border-bottom: none; }

/* ============================================================
   SECTION 14 - EDITORIAL (mirror PQ "own bodies" section)
   ============================================================ */
.editorial {
  padding: clamp(40px, 5vw, 60px) 0;
  background: var(--cream);
  color: var(--text-dark);
}
.editorial-grid {
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: clamp(30px, 5vw, 60px);
  align-items: center;
}
.editorial h2 {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  font-size: clamp(28px, 4vw, 46px);
  line-height: 1.1;
  color: var(--text-dark);
  margin-bottom: 24px;
  letter-spacing: -0.01em;
}
.editorial h2 strong {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--teal);
  display: block;
  font-size: 0.85em;
}
.editorial .body p {
  font-family: 'Inter', sans-serif;
  font-size: 17px;
  line-height: 1.65;
  color: var(--text-dark-mute);
  margin-bottom: 14px;
}
.editorial .body p strong { color: var(--text-dark); font-weight: 700; }
.editorial-image {
  aspect-ratio: 4/5;
  border-radius: var(--radius-xl);
  background: linear-gradient(135deg, #1a1a24, #0a0a0f);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  font-weight: 600;
  padding: 30px;
  text-align: center;
  box-shadow: var(--shadow);
}
@media (max-width: 800px) {
  .editorial-grid { grid-template-columns: 1fr; }
  .editorial-image { max-width: 360px; margin: 0 auto; min-height: 300px; aspect-ratio: 1/1; }
}

/* ============================================================
   SECTION 15 - SCARCITY CALLOUT
   ============================================================ */
.scarcity {
  padding: clamp(50px, 7vw, 80px) 0;
  background: var(--bg);
}
.scarcity-card {
  background: linear-gradient(135deg, rgba(0,166,210,0.12), rgba(51,184,221,0.04));
  border: 1px solid var(--border-teal);
  border-radius: var(--radius-xl);
  padding: clamp(28px, 4vw, 50px);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 30px;
  align-items: center;
}
.scarcity-card .text h3 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(22px, 3vw, 32px);
  line-height: 1.1;
  margin-bottom: 10px;
  letter-spacing: -0.02em;
  text-transform: none;
}
.scarcity-card .text h3 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}
.scarcity-card .text p {
  font-family: 'Inter', sans-serif;
  font-size: 17px;
  color: var(--text-dim);
}
@media (max-width: 700px) {
  .scarcity-card { grid-template-columns: 1fr; text-align: center; }
}

/* ============================================================
   SECTION 16 - AGGREGATE REVIEW BAR
   ============================================================ */
.review-summary {
  padding: clamp(50px, 7vw, 80px) 0;
  background: var(--cream);
  color: var(--text-dark);
}
.review-summary-card {
  background: #fff;
  border-radius: var(--radius-lg);
  padding: clamp(28px, 4vw, 44px);
  display: grid;
  grid-template-columns: 0.9fr 1.1fr;
  gap: 40px;
  align-items: center;
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: 0 8px 24px rgba(0,0,0,0.04);
}
.summary-score {
  text-align: center;
  border-right: 1px solid rgba(0,0,0,0.08);
  padding-right: 30px;
}
.summary-score .big {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 72px;
  line-height: 1;
  color: var(--text-dark);
  letter-spacing: -0.04em;
}
.summary-score .stars {
  color: var(--gold);
  font-size: 22px;
  letter-spacing: 3px;
  margin: 10px 0 6px;
}
.summary-score .total {
  font-size: 13px;
  color: var(--text-dark-mute);
  font-weight: 600;
}
.summary-bars { display: flex; flex-direction: column; gap: 8px; }
.bar-row {
  display: grid;
  grid-template-columns: 30px 1fr 50px;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--text-dark-mute);
  font-weight: 600;
}
.bar-row .bar {
  height: 8px;
  background: rgba(0,0,0,0.06);
  border-radius: 50px;
  overflow: hidden;
}
.bar-row .bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--teal-warm));
  border-radius: 50px;
}
@media (max-width: 700px) {
  .review-summary-card { grid-template-columns: 1fr; gap: 24px; }
  .summary-score { border-right: none; border-bottom: 1px solid rgba(0,0,0,0.08); padding: 0 0 24px; }
}

/* ============================================================
   SECTION 17 - PRICING CARDS
   ============================================================ */
.pricing {
  padding: clamp(40px, 5vw, 60px) 0;
  background: linear-gradient(180deg, var(--cream) 0%, #fff 100%);
  color: var(--text-dark);
}
.pricing-head { text-align: center; margin-bottom: 50px; }
.pricing-head h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(30px, 4.4vw, 50px);
  letter-spacing: -0.025em;
  margin-bottom: 14px;
  text-transform: none;
  color: var(--text-dark);
}
.pricing-head h2 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}
.pricing-head p { font-family: 'Inter', sans-serif; font-size: 18px; color: var(--text-dark-mute); }

/* Mini countdown above pricing */
.pricing-countdown {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-bottom: 30px;
  flex-wrap: nowrap;
}
.pricing-countdown .label {
  font-size: 13px;
  color: var(--teal);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-right: 4px;
  white-space: nowrap;
}
@media (max-width: 600px) {
  .pricing-countdown { flex-wrap: wrap; justify-content: center; gap: 8px; }
  .pricing-countdown .label { width: 100%; text-align: center; margin-right: 0; margin-bottom: 4px; }
}
.pricing-countdown .ct-unit {
  background: #f8f8f8;
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 10px;
  padding: 10px 14px;
  text-align: center;
  min-width: 60px;
}
.pricing-countdown .ct-unit .num {
  font-weight: 600;
  font-size: 24px;
  color: var(--text-dark);
  font-variant-numeric: tabular-nums;
  display: block;
  line-height: 1;
}
.pricing-countdown .ct-unit small {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dark-mute);
  margin-top: 4px;
  display: block;
}

.pricing-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 1000px;
  margin: 0 auto;
}
.price-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: var(--radius-xl);
  padding: clamp(26px, 3.5vw, 42px);
  position: relative;
  display: flex;
  flex-direction: column;
}
.price-card.featured {
  border: 2px solid var(--teal);
  background: linear-gradient(180deg, rgba(0,166,210,0.04), #fff);
  box-shadow: 0 24px 60px rgba(0,166,210,0.12);
  transform: translateY(-8px);
}
.price-card .ribbon {
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--teal), var(--teal-warm));
  color: #fff;
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 8px 18px;
  border-radius: 50px;
  white-space: nowrap;
  box-shadow: 0 8px 20px rgba(0,166,210,0.4);
}
.price-card h3 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 24px;
  text-transform: none;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
  color: var(--text-dark);
}
.price-card .tagline {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-size: 16px;
  color: var(--text-dark-mute);
  margin-bottom: 24px;
}
.price-card .product-mock {
  aspect-ratio: 16/10;
  border-radius: var(--radius);
  background:
    radial-gradient(circle at 50% 50%, rgba(0,166,210,0.18), transparent 60%),
    linear-gradient(135deg, var(--surface-2), var(--surface));
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 22px;
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border);
}
.price-card .product-mock img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
}
.price-card .product-mock .placeholder-label {
  text-align: center;
  font-size: 12px;
  color: var(--text-mute);
  font-weight: 600;
  padding: 20px;
}
.price-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 6px;
}
.price-row .now {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 48px;
  color: var(--teal);
  letter-spacing: -0.03em;
  line-height: 1;
}
.price-row .was {
  font-size: 22px;
  color: var(--text-dark-mute);
  text-decoration: line-through;
  font-weight: 600;
}
.price-card .per {
  font-size: 13px;
  color: var(--text-dark-mute);
  margin-bottom: 22px;
}
.price-card .per strong { color: var(--teal-warm); }
.price-perks {
  list-style: none;
  margin: 0 0 24px;
  padding: 18px 0;
  border-top: 1px solid rgba(0,0,0,0.08);
  border-bottom: 1px solid rgba(0,0,0,0.08);
}
.price-perks li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  color: var(--text-dark-mute);
  padding: 6px 0;
}
.price-perks li::before {
  content: '\2713';
  color: var(--teal);
  font-weight: 600;
  width: 20px;
  height: 20px;
  background: var(--teal-soft);
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
}
.price-card .btn { width: 100%; }
.price-card .stock-row {
  margin-top: 14px;
  font-size: 12px;
  text-align: center;
  color: var(--text-dark-mute);
}
.price-card .stock-row strong { color: var(--teal); }
@media (max-width: 800px) {
  .pricing-grid { grid-template-columns: 1fr; }
  .price-card.featured { transform: none; }
}

/* ============================================================
   SECTION 18 - FAQ
   ============================================================ */
.faq {
  padding: clamp(40px, 5vw, 60px) 0;
  background: var(--cream);
  color: var(--text-dark);
}
.faq-head { text-align: center; margin-bottom: 40px; }
.faq-head h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(28px, 4vw, 46px);
  letter-spacing: -0.025em;
  text-transform: none;
}
.faq-head h2 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}
.faq-list {
  max-width: 800px;
  margin: 0 auto;
}
.faq-item {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.25s;
}
.faq-item.open { border-color: var(--teal); box-shadow: 0 8px 24px rgba(0,166,210,0.12); }
.faq-q {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 22px 26px;
  text-align: left;
  font-weight: 600;
  font-size: 17px;
  color: var(--text-dark);
}
.faq-q .icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--teal-soft);
  border: 1px solid var(--border-teal);
  color: var(--teal);
  font-weight: 600;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform 0.25s, background 0.25s;
}
.faq-item.open .faq-q .icon { transform: rotate(45deg); background: var(--teal); color: #fff; }
.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.faq-item.open .faq-a { max-height: 600px; }
.faq-a-inner {
  padding: 0 26px 24px;
  font-family: 'Inter', sans-serif;
  font-size: 17px;
  line-height: 1.6;
  color: var(--text-dark-mute);
}

/* ============================================================
   SECTION 19 - DISCLAIMER FOOTER
   ============================================================ */
.disclaimer {
  padding: 50px 0 120px;
  background: var(--bg);
  border-top: 1px solid var(--border);
}
.disclaimer .container {
  max-width: 900px;
}
.disclaimer p {
  font-size: 13px;
  color: var(--text-mute);
  line-height: 1.6;
  margin-bottom: 12px;
}
.disclaimer .copyright {
  margin-top: 24px;
  text-align: center;
  color: var(--text-faint);
  font-size: 12px;
}

/* ============================================================
   STICKY MOBILE CTA BAR (bottom)
   ============================================================ */
.sticky-cta {
  display: none !important;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(180deg, rgba(10,10,15,0.95), rgba(10,10,15,1));
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border-teal);
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  z-index: 99;
  transform: translateY(110%);
  transition: transform 0.4s cubic-bezier(.2,.8,.2,1);
  box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
}
.sticky-cta.visible { transform: translateY(0); }
.sticky-cta-inner {
  display: flex;
  align-items: center;
  gap: 12px;
  max-width: var(--max);
  margin: 0 auto;
}
.sticky-cta .info {
  flex: 1;
  min-width: 0;
}
.sticky-cta .info .top {
  font-size: 11px;
  color: var(--teal-warm);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 2px;
}
.sticky-cta .info .bot {
  font-size: 14px;
  color: var(--text);
  font-weight: 700;
  display: flex;
  gap: 6px;
  align-items: baseline;
  flex-wrap: wrap;
}
.sticky-cta .info .bot .price {
  color: var(--teal);
  font-size: 16px;
  font-weight: 600;
}
.sticky-cta .info .bot .strike {
  text-decoration: line-through;
  color: var(--text-mute);
  font-size: 13px;
}
.sticky-cta .btn {
  padding: 14px 22px;

    })();

    // CHART DRAW ANIMATION (scroll-triggered)
    // ====================================================================
    (function() {
      var charts = document.querySelectorAll('.chart-draw');
      if (!charts.length) return;
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('drawn');
            observer.unobserve(entry.target);
          }
        });
      }, {threshold: 0.3});
      charts.forEach(function(el) { observer.observe(el); });

      // Also animate comp-bar fills
      var compSection = document.querySelector('.comp-bars__title');
      if (compSection) {
        var compObs = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.parentElement.classList.add('comp-bars-drawn');
              compObs.unobserve(entry.target);
            }
          });
        }, {threshold: 0.3});
        compObs.observe(compSection);
      }
    })();

    // ====================================================================
    // COUNTUP ANIMATION
    // ====================================================================
    (function() {
      var nums = document.querySelectorAll('.countup-num');
      if (!nums.length) return;
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var el = entry.target;
            observer.unobserve(el);
            var target = parseInt(el.getAttribute('data-target'));
            var suffix = el.getAttribute('data-suffix') || '';
            var duration = 2000;
            var start = performance.now();
            function animate(now) {
              var elapsed = now - start;
              var progress = Math.min(elapsed / duration, 1);
              var eased = 1 - Math.pow(1 - progress, 3);
              el.textContent = Math.round(eased * target) + suffix;
              if (progress < 1) requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
          }
        });
      }, {threshold: 0.5});
      nums.forEach(function(el) { observer.observe(el); });
    })();

    // ====================================================================
    // BRAIN SYSTEMS TABS
    // ====================================================================
    (function() {
      var pills = document.querySelectorAll('.brain-pill');
      var panel = document.getElementById('brainPanel');
      if (!pills.length || !panel) return;
      var systems = [
        {icon: '\uD83E\uDDE0', name: 'Cognitive Function', desc: 'Ginkgo Biloba (50:1), Bacopa Monnieri (11:1), and Lion\u2019s Mane (4:1) work together to enhance cerebral blood flow, stimulate neural growth factor, and consolidate memory pathways.'},
        {icon: '\u26A1', name: 'Energy & Alertness', desc: 'Guarana Seed provides sustained natural caffeine release, while B-Vitamins (B6 at 714% RI, B12 at 20,000% RI) fuel cellular energy production without crashes or jitters.'},
        {icon: '\uD83C\uDFAF', name: 'Focus & Attention', desc: 'L-Tyrosine (100mg) is a direct dopamine precursor that enhances focus under stress. Paired with Choline (100mg) for acetylcholine production.'},
        {icon: '\uD83D\uDEE1\uFE0F', name: 'Stress Resilience', desc: 'Panax Ginseng (20:1 extract) is a clinically-studied adaptogen that helps your brain perform under pressure. Phosphatidylserine (35mg) reduces cortisol and supports stress recovery.'},
        {icon: '\uD83D\uDCDA', name: 'Memory & Recall', desc: 'Bacopa Monnieri (11:1 extract, 80mg) is one of the most researched memory herbs. Combined with Sage Leaf (4:1 extract) and Zinc (100% RI) for enhanced retention and recall speed.'},
        {icon: '\uD83C\uDF3F', name: 'Neuroprotection', desc: 'Rosemary (5:1 extract) provides carnosic acid for long-term brain cell protection. Niacin (B3, 32mg) drives NAD+ production for cellular repair and cognitive longevity.'}
      ];
      pills.forEach(function(pill) {
        pill.addEventListener('click', function() {
          var idx = parseInt(this.getAttribute('data-idx'));
          pills.forEach(function(p) { p.classList.remove('active'); });
          this.classList.add('active');
          var s = systems[idx];
          panel.innerHTML = '<div class="brain-panel__header"><span class="brain-panel__icon">' + s.icon + '</span><span class="brain-panel__name">' + s.name + '</span></div><p class="brain-panel__desc">' + s.desc + '</p>';
        });
      });
    })();

    // ====================================================================
    // SCROLLER - auto-scrolling continuous loop (independent of hero)
    // ====================================================================

    // ====================================================================
    // COUNTDOWN TIMER (synced across all instances - evergreen 3-day reset)
    // ====================================================================
    (function() {
      var KEY = 'gm_cd_end';
      var stored = localStorage.getItem(KEY);
      var end;
      if (stored) {
        end = new Date(parseInt(stored, 10));
        if (isNaN(end.getTime()) || end <= new Date()) {
          end = new Date(Date.now() + 3 * 86400000);
          localStorage.setItem(KEY, end.getTime());
        }
      } else {
        end = new Date(Date.now() + 3 * 86400000);
        localStorage.setItem(KEY, end.getTime());
      }

      var targets = [
        ['ab-d','ab-h','ab-m','ab-s'],
        ['pc-d','pc-h','pc-m','pc-s'],
        ['sc-d','sc-h','sc-m','sc-s']
      ];

      function pad(n) { return String(n).padStart(2, '0'); }

      function tick() {
        var diff = end - new Date();
        if (diff <= 0) {
          end = new Date(Date.now() + 3 * 86400000);
          localStorage.setItem(KEY, end.getTime());
          diff = end - new Date();
        }
        var d = Math.floor(diff / 86400000);
        var h = Math.floor((diff % 86400000) / 3600000);
        var m = Math.floor((diff % 3600000) / 60000);
        var s = Math.floor((diff % 60000) / 1000);
        var vals = [pad(d), pad(h), pad(m), pad(s)];
        targets.forEach(function(set) {
          set.forEach(function(id, i) {
            var el = document.getElementById(id);
            if (el) el.textContent = vals[i];
          });
        });
      }
      tick();
      setInterval(tick, 1000);
    })();

    // ====================================================================
    // FAQ ACCORDION
    // ====================================================================
    document.querySelectorAll('.faq-q').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var item = this.parentElement;
        var wasOpen = item.classList.contains('open');
        document.querySelectorAll('.faq-item').forEach(function(el) { el.classList.remove('open'); });
        if (!wasOpen) item.classList.add('open');
      });
    });

    // ====================================================================
    // STICKY CTA - show after user scrolls past hero
    // ====================================================================
    (function() {
      var cta = document.getElementById('stickyCta');
      var threshold = 700;
      var pricing = document.getElementById('pricing');
      function check() {
        var inPricing = false;
        if (pricing) {
          var rect = pricing.getBoundingClientRect();
          inPricing = rect.top < window.innerHeight && rect.bottom > 0;
        }
        if (window.scrollY > threshold && !inPricing) {
          cta.classList.add('visible');
        } else {
          cta.classList.remove('visible');
        }
      }
      window.addEventListener('scroll', check, { passive: true });
      check();
    })();

    // ====================================================================
    // SCROLL REVEAL
    // ====================================================================
    (function() {
      if (!('IntersectionObserver' in window)) return;
      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
          if (e.isIntersecting) {
            e.target.classList.add('in');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.12 });
      document.querySelectorAll('section > .container > *, .vs-card, .review-card, .review-card--x, .review-card--reddit, .price-card, .promise-badge, .tl-item').forEach(function(el) {
        el.classList.add('reveal');
        io.observe(el);
      });
    })();
  }

})();
</script>
</body>
