<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>Genius Mind by JustFloow - Cognitive Infrastructure for Operators</title>
<meta name="description" content="You know exactly what you need to do. Your brain just won't let you start. Genius Mind is a 16-ingredient nootropic stack built for founders and operators who can't afford to drop a beat after 3pm.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ====================================================================
   GENIUS MIND × CHAOS OPERATOR - PRELANDER
   Dark premium aesthetic. Mobile-first. Inspired by Primal Queen
   structure, rebuilt in Genius Mind brand language.
   ==================================================================== */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
em, i, .italic, .serif { font-style: normal !important; }

:root {
  /* Brand kit colours */
  --bg: #0e1117;
  --surface: #161b22;
  --surface-2: #1c2129;
  --surface-3: #242a33;
  --cream: #f5f1e8;
  --cream-warm: #faf6ec;
  --paper: #fcfcfc;

  --teal: #00A6D2;
  --teal-warm: #33B8DD;
  --teal-glow: rgba(0, 166, 210, 0.18);
  --teal-soft: rgba(0, 166, 210, 0.08);

  --text: #ffffff;
  --text-dim: #c7c7d4;
  --text-mute: #8a8aa0;
  --text-faint: #5a5a6e;

  --text-dark: #0a0a0f;
  --text-dark-mute: #4a4a58;

  --gold: #FFD700;
  --green: #22d3a0;
  --red: #E8283B;
  --teal: #00A6D2;

  --border: rgba(255,255,255,0.08);
  --border-teal: rgba(0,166,210,0.28);
  --border-strong: rgba(255,255,255,0.16);

  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 22px;
  --radius-xl: 32px;

  --shadow-sm: 0 2px 12px rgba(0,0,0,0.4);
  --shadow: 0 12px 40px rgba(0,0,0,0.5);
  --shadow-teal: 0 12px 40px rgba(0,166,210,0.35);

  --max: 1180px;
  --pad: clamp(20px, 4vw, 40px);
}

html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  font-size: 17px;
}

img { max-width: 100%; height: auto; display: block; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; font-family: inherit; background: none; color: inherit; }

.container { max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); }
.serif { font-family: 'EB Garamond', Garamond, 'Times New Roman', serif; }
.upper { text-transform: uppercase; letter-spacing: 0.04em; }
.center { text-align: center; }

/* ============================================================
   SHARED COMPONENTS
   ============================================================ */

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--teal-soft);
  border: 1px solid var(--border-teal);
  color: var(--teal-warm);
  font-size: 12px;
  font-weight: 700;
  padding: 8px 16px;
  border-radius: 50px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 22px;
}
.eyebrow::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 10px var(--teal);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.4); }
}

.h-display {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: clamp(34px, 5.6vw, 64px);
  line-height: 1.04;
  letter-spacing: -0.025em;
  text-transform: none;
}
.h-display em {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  text-transform: none;
  color: var(--teal);
  letter-spacing: -0.01em;
}

.h-editorial {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: clamp(28px, 4vw, 46px);
  line-height: 1.15;
  letter-spacing: -0.01em;
}

.h-section {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: clamp(28px, 4.4vw, 50px);
  line-height: 1.08;
  letter-spacing: -0.025em;
  text-transform: none;
}
.h-section em {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}

.subtitle {
  font-size: clamp(16px, 1.8vw, 19px);
  color: var(--text-dim);
  line-height: 1.6;
  max-width: 640px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: #fff;
  color: #0e1117;
  font-weight: 700;
  font-size: 16px;
  padding: 16px 32px;
  border-radius: 60px;
  text-transform: none;
  letter-spacing: 0.01em;
  transition: all 0.25s ease;
  box-shadow: 0 4px 20px rgba(255,255,255,0.1);
  min-height: 52px;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: transparent;
  opacity: 0;
  transition: opacity 0.25s;
}
.btn:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(255,255,255,0.15); }
.btn:hover::after { opacity: 0; }
.btn-arrow { font-size: 20px; transition: transform 0.25s; }
.btn:hover .btn-arrow { transform: translateX(4px); }

.btn-ghost {
  background: transparent;
  border: 1.5px solid var(--border-strong);
  color: var(--text);
  box-shadow: none;
}
.btn-ghost:hover { border-color: var(--teal); color: var(--teal); box-shadow: none; transform: none; }

.trust-pill-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-top: 22px;
}
.trust-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
}
.trust-pill .check { color: var(--teal); font-weight: 600; }

/* ============================================================
   STICKY HEADER (Brain.fm style)
   ============================================================ */
.sticky-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  background: rgba(14,17,23,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 0 var(--pad);
  height: 56px;
  display: flex;
  align-items: center;
}
.sticky-header__inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sticky-header__logo {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
}
.sticky-header__logo .infinity {
  color: var(--teal);
  font-size: 22px;
}
.sticky-header__cta {
  background: #fff;
  color: #0e1117;
  font-weight: 700;
  font-size: 13px;
  padding: 10px 22px;
  border-radius: 50px;
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  transition: transform 0.2s ease;
}
.sticky-header__cta:hover {
  transform: scale(1.05);
}
/* Old announce bar hidden */
.announce-bar { display: none !important; }

/* ============================================================
   SECTION 2 - HERO
   ============================================================ */
.hero {
  position: relative;
  padding: clamp(60px, 10vw, 120px) 0 clamp(70px, 10vw, 130px);
  background: var(--bg);
  overflow: hidden;
}
.hero-grid {
  position: relative;
  min-height: 520px;
  position: relative;
  z-index: 2;
}
.hero-content {
  max-width: 60%;
  position: relative;
  z-index: 2;
}
.hero h1 {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: clamp(42px, 6.5vw, 78px);
  line-height: 1.05;
  letter-spacing: -0.03em;
  text-transform: none;
  margin-bottom: 24px;
  min-height: 3.5em;
}
/* Hero rotating word - Brain.fm style with highlight block */
.hero-rotate {
  display: inline-block;
  position: relative;
  vertical-align: bottom;
  height: 1.1em;
  overflow: hidden;
}
.hero-rotate__word {
  display: inline-block;
  color: #fff;
  position: absolute;
  left: 0;
  top: 0;
  white-space: nowrap;
  opacity: 0;
  transform: translateY(100%);
  transition: opacity 0.65s ease, transform 0.65s ease;
  padding: 0 0.15em;
  background: linear-gradient(135deg, #00A6D2, #0088b0);
  border-radius: 6px;
}
.hero-rotate__word.active {
  opacity: 1;
  transform: translateY(0);
  position: relative;
}
.hero-rotate__word.exit {
  opacity: 0;
  transform: translateY(-100%);
}
.hero-subtitle {
  font-size: clamp(17px, 1.9vw, 21px);
  color: var(--text-dim);
  max-width: 520px;
  margin-bottom: 32px;
  line-height: 1.5;
}
.hero p.lede {
  font-family: 'Inter', sans-serif;
  font-size: clamp(17px, 1.9vw, 21px);
  line-height: 1.55;
  color: var(--text-dim);
  max-width: 560px;
  margin-bottom: 28px;
}
.hero-cta-row {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 18px;
}
/* Hero trust strip - moved below hero */
.hero-trust-strip {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 0;
}
.hero-trust-strip__inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  flex-wrap: wrap;
}
.hero-trust-strip .stars-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
}
.hero-trust-strip .stars-row .stars { color: var(--gold); letter-spacing: 2px; font-size: 14px; }
.hero-trust-strip .stars-row strong { color: var(--text); }
.hero-trust-strip .trust-pill {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-mute);
  display: flex;
  align-items: center;
  gap: 6px;
}
.hero-trust-strip .trust-pill .check {
  color: var(--teal);
  font-size: 13px;
}
.hero-trust-strip__sep {
  width: 1px;
  height: 16px;
  background: var(--border);
}

/* Hero portrait card - absolutely positioned so text changes can't move it */
.hero-portrait {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 34%;
  aspect-ratio: 3/4;
  border-radius: 24px;
  background: var(--surface-2);
  border: 1px solid rgba(255,255,255,0.06);
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
/* Radial glow behind portrait */
.hero-portrait::before {
  content: '';
  position: absolute;
  top: -80px; left: -80px; right: -80px; bottom: -80px;
  background: radial-gradient(circle at 50% 45%, rgba(0,166,210,0.2), rgba(0,166,210,0.05) 45%, transparent 70%);
  filter: blur(40px);
  z-index: -1;
  pointer-events: none;
}
.hero-portrait .placeholder-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-mute);
  letter-spacing: 0.05em;
  padding: 30px;
  line-height: 1.5;
}
.hero-portrait img.portrait-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
}
.hero-portrait .portrait-tag {
  position: absolute;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border-strong);
  color: var(--text);
  padding: 10px 22px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  z-index: 3;
}
.hero-portrait .floating-badge {
  position: absolute;
  top: 24px;
  right: -10px;
  width: 96px;
  height: 96px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00A6D2 0%, #33B8DD 100%);
  color: #0a0a0f;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 13px;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  line-height: 1.05;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 4px rgba(0,166,210,0.15);
  transform: rotate(-12deg);
  z-index: 4;
}
.hero-portrait .product-overlay {
  position: absolute;
  bottom: -30px; right: -20px;
  width: 140px;
  z-index: 2;
  filter: drop-shadow(0 12px 24px rgba(0,0,0,0.6));
  pointer-events: none;
}
@media (max-width: 900px) {
  .hero-grid { min-height: auto; }
  .hero-content { max-width: 100%; }
  .hero-portrait { position: relative; width: 100%; max-width: 360px; margin: 30px auto 0; right: auto; top: auto; }
  .hero h1 { font-size: clamp(34px, 8vw, 48px); min-height: auto; }
}

/* ============================================================
   HERO BENEFITS SCROLLER (Brain.fm style)
   ============================================================ */
.hero-scroller {
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 0;
  position: relative;
  max-width: 900px;
  margin: 0 auto;
  border-radius: 0;
}
.hero-scroller__inner {
  display: flex;
  align-items: center;
}
.hero-scroller__arrow {
  background: none;
  border: none;
  color: var(--text-mute);
  cursor: pointer;
  padding: 14px 14px;
  font-size: 20px;
  flex-shrink: 0;
  transition: color 0.2s;
  display: flex;
  align-items: center;
}
.hero-scroller__arrow:hover { color: var(--teal); }
.hero-scroller__track {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scroll-behavior: smooth;
  scrollbar-width: none;
  -ms-overflow-style: none;
  flex: 1;
}
.hero-scroller__track::-webkit-scrollbar { display: none; }
.hero-scroller__item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 20px;
  color: var(--text-mute);
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
  flex-shrink: 0;
  transition: color 0.3s;
  cursor: pointer;
}
.hero-scroller__item:hover { color: #fff; }
.hero-scroller__item.active { color: var(--teal); }
.hero-scroller__item svg {
  width: 16px; height: 16px;
  opacity: 0.5;
  flex-shrink: 0;
}
@media (max-width: 900px) {
  .hero-scroller { max-width: 100%; border-radius: 0; }
}

/* ============================================================
   SOCIAL PROOF SECTION (Brain.fm layout: left text + right cards)
   ============================================================ */
.social-proof-section {
  padding: clamp(60px, 8vw, 100px) 0;
  background: var(--bg);
  overflow: hidden;
}
.social-proof__grid {
  display: grid;
  grid-template-columns: 0.45fr 0.55fr;
  gap: clamp(40px, 5vw, 80px);
  align-items: center;
}
.social-proof__left {}
.social-proof__left h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: clamp(36px, 5vw, 64px);
  color: #fff;
  line-height: 1.0;
  letter-spacing: -0.03em;
  margin-bottom: 20px;
}
.social-proof__left h2 em {
  font-style: italic;
  color: var(--teal-warm);
  background: none;
}
.social-proof__left p {
  font-size: 17px;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 32px;
}
.social-proof__featured-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-mute);
  margin-bottom: 18px;
}
.social-proof__logos {
  display: flex;
  align-items: center;
  gap: clamp(20px, 3vw, 40px);
  flex-wrap: wrap;
  opacity: 0.35;
}
.social-proof__logos span {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: clamp(16px, 2vw, 22px);
  color: #fff;
}
/* Right side - stacked/offset cards */
.social-proof__cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 16px;
  position: relative;
}
.social-proof__cards .dark-review:nth-child(1) {
  grid-column: 1;
  grid-row: 1;
}
.social-proof__cards .dark-review:nth-child(2) {
  grid-column: 2;
  grid-row: 1 / 3;
  align-self: center;
}
.social-proof__cards .dark-review:nth-child(3) {
  grid-column: 1;
  grid-row: 2;
}
@media (max-width: 800px) {
  .social-proof__grid { grid-template-columns: 1fr; }
  .social-proof__cards {
    grid-template-columns: 1fr;
    max-width: 480px;
    margin: 0 auto;
  }
  .social-proof__cards .dark-review:nth-child(2) {
    grid-column: 1;
    grid-row: auto;
  }
}
.dark-review {
  background: linear-gradient(145deg, #1c2129, #161b22);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 24px;
}
.dark-review__header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.dark-review__avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--surface-3);
  overflow: hidden;
  flex-shrink: 0;
}
.dark-review__avatar img {
  width: 100%; height: 100%; object-fit: cover;
}
.dark-review__user { flex-grow: 1; }
.dark-review__name {
  font-weight: 700;
  font-size: 15px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 4px;
}
.dark-review__verified {
  display: inline-flex;
  width: 18px; height: 18px;
  background: #1d9bf0;
  border-radius: 50%;
  align-items: center;
  justify-content: center;
}
.dark-review__verified svg { width: 12px; height: 12px; fill: #fff; }
.dark-review__handle {
  font-size: 13px;
  color: var(--text-mute);
}
.dark-review__body {
  font-size: 15px;
  line-height: 1.55;
  color: var(--text-dim);
}
.dark-review__highlight {
  color: var(--teal);
  font-weight: 600;
}
@media (max-width: 800px) {
  .dark-reviews__grid { grid-template-columns: 1fr; max-width: 480px; margin: 0 auto; }
}

/* Old marquee styles kept for compat */
.marquee { display: none; }
.marquee span {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  color: var(--text-dim);
  font-weight: 500;
  font-size: 15px;
  text-transform: none;
  letter-spacing: 0.02em;
  font-style: italic;
}
.marquee span::before {
  content: '·';
  color: var(--teal);
  font-size: 20px;
  font-style: normal;
}

/* ============================================================
   SECTION 4 - STAT STRIP (by the numbers)
   ============================================================ */
.stat-strip {
  padding: clamp(28px, 4vw, 44px) 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.stat-strip__grid {
  display: flex;
  justify-content: center;
  gap: 0;
  text-align: center;
}
.stat-strip__item {
  flex: 1;
  max-width: 200px;
  padding: 0 20px;
  border-right: 1px solid var(--border);
}
.stat-strip__item:last-child { border-right: none; }
.stat-strip__number {
  font-family: 'Inter', sans-serif;
  font-size: clamp(28px, 4vw, 40px);
  font-weight: 800;
  color: var(--teal);
  line-height: 1;
  letter-spacing: -0.02em;
}
.stat-strip__label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 6px;
}
@media (max-width: 800px) {
  .stat-strip__grid { flex-wrap: wrap; }
  .stat-strip__item { flex: 0 0 50%; max-width: none; padding: 12px 20px; border-right: none; }
  .stat-strip__item:nth-child(1), .stat-strip__item:nth-child(2) { border-bottom: 1px solid var(--border); }
}

/* ============================================================
   SECTION 4b - FOUNDER (condensed pull-quote)
   ============================================================ */
.founder {
  padding: clamp(60px, 8vw, 110px) 0;
  background: var(--cream);
  color: var(--text-dark);
  position: relative;
}
.founder-grid {
  display: grid;
  grid-template-columns: 0.85fr 1.15fr;
  gap: clamp(30px, 5vw, 60px);
  align-items: center;
}
.founder-photo {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: linear-gradient(135deg, #2a2a3a 0%, #1a1a24 100%);
  aspect-ratio: 3/4;
  box-shadow: var(--shadow);
}
.founder-photo .placeholder-label {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  text-align: center; color: rgba(255,255,255,0.4); font-size: 13px; padding: 24px; font-weight: 600;
}
.founder-photo .photo-caption {
  position: absolute; bottom: 18px; left: 18px;
  background: rgba(10,10,15,0.85); backdrop-filter: blur(8px); color: #fff;
  padding: 10px 18px; border-radius: 50px; font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.founder-content h2 {
  font-family: 'Inter', sans-serif; font-weight: 600;
  font-size: clamp(32px, 4.5vw, 52px); line-height: 1.05;
  letter-spacing: -0.02em; margin-bottom: 8px; color: var(--text-dark);
}
.founder-content h2 em { font-style: normal; font-weight: 500; color: var(--teal); }
.founder-content p.intro {
  font-size: 19px; color: var(--text-dark-mute); margin-bottom: 24px;
}
.founder-content .body p {
  font-size: 17px; line-height: 1.65; color: var(--text-dark-mute); margin-bottom: 14px;
}
.founder-content .body p strong { color: var(--text-dark); font-weight: 700; }
@media (max-width: 800px) {
  .founder-grid { grid-template-columns: 1fr; }
  .founder-photo { max-width: 360px; margin: 0 auto 24px; min-height: 300px; }
}

/* ============================================================
   SECTION 5 - DATA-LED FEATURE BLOCKS (replaces why-built + problem)
   ============================================================ */
.feature-blocks {
  padding: clamp(60px, 8vw, 110px) 0;
  background: var(--bg);
}
.feature-block {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(40px, 6vw, 80px);
  align-items: center;
  padding: clamp(40px, 5vw, 70px) 0;
  border-bottom: 1px solid var(--border);
}
.feature-block:last-child { border-bottom: none; }
.feature-block--reverse { direction: rtl; }
.feature-block--reverse > * { direction: ltr; }
.feature-block__content {}
.feature-block__stat {
  font-family: 'Inter', sans-serif;
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 800;
  color: var(--teal);
  line-height: 1;
  letter-spacing: -0.03em;
  margin-bottom: 12px;
}
.feature-block__title {
  font-family: 'Inter', sans-serif;
  font-size: clamp(22px, 3vw, 32px);
  font-weight: 700;
  color: var(--text);
  margin-bottom: 18px;
  line-height: 1.15;
}
.feature-block__bullets {
  list-style: none;
  padding: 0;
}
.feature-block__bullets li {
  font-size: 16px;
  color: var(--text-dim);
  line-height: 1.55;
  padding: 8px 0 8px 28px;
  position: relative;
}
.feature-block__bullets li::before {
  content: '';
  position: absolute;
  left: 0; top: 14px;
  width: 8px; height: 8px;
  background: var(--teal);
  border-radius: 50%;
}
/* Feature block chart/visual */
.feature-block__visual {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: clamp(24px, 3vw, 40px);
  position: relative;
  overflow: hidden;
}
/* Mini line chart (cognitive decline) */
.mini-chart { position: relative; height: 200px; }
.mini-chart__title {
  font-size: 12px; font-weight: 600; color: var(--text-mute);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px;
}
.mini-chart svg { width: 100%; height: 160px; }
.mini-chart__labels {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--text-mute); margin-top: 8px;
}
/* Comparison bars */
.comp-bars {}
.comp-bars__title {
  font-size: 12px; font-weight: 600; color: var(--text-mute);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px;
}
.comp-bar {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.comp-bar__label {
  font-size: 13px; font-weight: 600; color: var(--text-dim);
  width: 110px; flex-shrink: 0; text-align: right;
}
.comp-bar__track {
  flex: 1; height: 28px; background: rgba(255,255,255,0.04);
  border-radius: 6px; overflow: hidden; position: relative;
}
.comp-bar__fill {
  height: 100%; border-radius: 6px;
  transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.comp-bar__fill--gm { background: linear-gradient(90deg, var(--teal), var(--teal-warm)); }
.comp-bar__fill--coffee { background: #8B6F47; }
.comp-bar__fill--adderall { background: #9B59B6; }
.comp-bar__fill--generic { background: #5a5a6e; }
.comp-bar__value {
  font-size: 12px; font-weight: 700; color: var(--text);
  width: 36px; flex-shrink: 0;
}
/* Tabs visual */
.tabs-visual {
  text-align: center;
}
.tabs-visual__img {
  font-size: 64px; margin-bottom: 16px; line-height: 1;
}
.tabs-visual__caption {
  font-size: 14px; color: var(--text-dim); font-style: italic;
}
@media (max-width: 800px) {
  .feature-block { grid-template-columns: 1fr; }
  .feature-block--reverse { direction: ltr; }
}

/* ============================================================
   SECTION 7 - DOSAGE COMPARISON CHART (horizontal bars)
   ============================================================ */
.dosage-chart {
  padding: clamp(60px, 8vw, 110px) 0;
  background: var(--cream);
  color: var(--text-dark);
}
.dosage-chart__head {
  text-align: center;
  margin-bottom: 50px;
}
.dosage-chart__head h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: clamp(26px, 3.5vw, 42px);
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--text-dark);
  margin-bottom: 14px;
}
.dosage-chart__head h2 em { font-style: normal; font-weight: 500; color: var(--teal); }
.dosage-chart__head p {
  font-size: 17px; color: var(--text-dark-mute); max-width: 560px; margin: 0 auto;
}
.dosage-chart__legend {
  display: flex; justify-content: center; gap: 28px; margin-bottom: 32px; font-size: 13px; font-weight: 600;
}
.dosage-chart__legend span { display: flex; align-items: center; gap: 8px; color: var(--text-dark-mute); }
.dosage-chart__legend-dot { width: 12px; height: 12px; border-radius: 3px; }
.dosage-chart__legend-dot--gm { background: var(--teal); }
.dosage-chart__legend-dot--avg { background: #c7c7d4; }
.dosage-chart__legend-dot--threshold { background: none; border: 2px dashed #e8283b; width: 20px; height: 0; }
.dosage-row {
  display: grid;
  grid-template-columns: 140px 1fr 60px;
  gap: 16px;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.dosage-row:last-child { border-bottom: none; }
.dosage-row__name {
  font-weight: 600; font-size: 14px; color: var(--text-dark); text-align: right;
}
.dosage-row__name small { display: block; font-size: 11px; color: var(--text-dark-mute); font-weight: 500; }
.dosage-row__bars { position: relative; height: 36px; background: rgba(0,0,0,0.03); border-radius: 6px; overflow: visible; }
.dosage-row__bar {
  position: absolute; left: 0; height: 18px; border-radius: 4px;
  transition: width 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.dosage-row__bar--gm { top: 0; background: linear-gradient(90deg, var(--teal), var(--teal-warm)); }
.dosage-row__bar--avg { top: 20px; background: #c7c7d4; opacity: 0.6; }
.dosage-row__threshold {
  position: absolute; top: -4px; bottom: -4px; width: 2px;
  border-left: 2px dashed rgba(232,40,59,0.4);
}
.dosage-row__dose { font-size: 13px; font-weight: 700; color: var(--teal); }
@media (max-width: 600px) {
  .dosage-row { grid-template-columns: 100px 1fr 50px; }
  .dosage-row__name { font-size: 12px; }
}

/* ============================================================
   SECTION 8 - BRAND PROMISE BADGES
   ============================================================ */
.promise {
  display: none !important;
  padding: clamp(40px, 5vw, 70px) 0;
  background: var(--cream);
  color: var(--text-dark);
  border-top: 1px solid rgba(0,0,0,0.06);
}
.promise h3 {
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(22px, 3vw, 34px);
  letter-spacing: -0.02em;
  margin-bottom: 32px;
  color: var(--text-dark);
  text-transform: uppercase;
}
.promise h3 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}
.promise-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 14px;
}
.promise-badge {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 18px 10px;
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid rgba(0,0,0,0.06);
  text-align: center;
  transition: transform 0.25s, box-shadow 0.25s;
}
.promise-badge:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.08); }
.promise-badge .ring {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: transparent;
  border: 1.5px solid rgba(0,0,0,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dark);
  font-weight: 600;
  font-size: 18px;
}
.promise-badge .ring svg { width: 26px; height: 26px; }
.promise-badge .label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-dark);
}
@media (max-width: 800px) {
  .promise-row { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 460px) {
  .promise-row { grid-template-columns: repeat(2, 1fr); }
}

/* ============================================================
   SECTION 9 - FACILITY (oval framed)
   ============================================================ */
.facility {
  padding: clamp(60px, 8vw, 110px) 0;
  background: var(--cream);
  color: var(--text-dark);
  text-align: center;
}
.facility h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: clamp(32px, 5vw, 56px);
  letter-spacing: -0.03em;
  margin-bottom: 40px;
  color: var(--text-dark);
  text-transform: none;
  line-height: 1.05;
}
.facility h2 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}
.facility-frame {
  max-width: 460px;
  aspect-ratio: 4/5;
  margin: 0 auto;
  border-radius: 50% / 42%;
  background: linear-gradient(135deg, #2a2a3a, #0a0a0f);
  border: 3px solid var(--teal);
  box-shadow: 0 24px 60px rgba(0,166,210,0.2);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  font-weight: 600;
  padding: 30px;
  text-align: center;
}
.facility-trust {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 30px;
  flex-wrap: wrap;
}
.facility-trust span {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: clamp(18px, 2.5vw, 24px);
  font-weight: 600;
  color: var(--text-dark);
}
.facility-trust .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--teal);
  display: inline-block;
}

/* ============================================================
   SECTION 10 - RESULTS LINE GRAPH
   ============================================================ */
.results-graph {
  padding: clamp(60px, 8vw, 110px) 0;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.results-graph::before {
  content: '';
  position: absolute;
  top: 0; right: -150px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,166,210,0.1), transparent 60%);
  filter: blur(50px);
}
.results-graph__head {
  text-align: center; margin-bottom: 50px; position: relative; z-index: 2;
}
.results-graph__head h2 {
  font-family: 'Inter', sans-serif; font-weight: 700;
  font-size: clamp(30px, 4.4vw, 50px); letter-spacing: -0.025em; margin-bottom: 16px;
}
.results-graph__head h2 em { font-style: normal; font-weight: 500; color: var(--teal); }
.results-graph__head p {
  font-size: 17px; color: var(--text-dim); max-width: 560px; margin: 0 auto;
}
.results-graph__chart {
  position: relative; z-index: 2;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: clamp(24px, 4vw, 48px);
  max-width: 800px;
  margin: 0 auto;
}
.results-graph__chart svg { width: 100%; height: auto; }
.results-graph__annotations {
  display: flex; justify-content: space-between; flex-wrap: wrap;
  gap: 12px; margin-top: 24px;
}
.results-graph__note {
  flex: 1; min-width: 140px;
  text-align: center; padding: 12px;
  background: rgba(0,166,210,0.06);
  border: 1px solid var(--border-teal);
  border-radius: 8px;
}
.results-graph__note-period {
  font-size: 11px; font-weight: 700; color: var(--teal);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
}
.results-graph__note-text {
  font-size: 13px; color: var(--text-dim); font-weight: 500;
}
.results-graph__disclaimer {
  text-align: center; margin-top: 20px;
  font-size: 12px; color: var(--text-mute); font-style: italic;
}

/* ============================================================
   SECTION 11 - REVIEWS
   ============================================================ */
.reviews {
  padding: clamp(60px, 8vw, 110px) 0;
  background: var(--cream);
  color: var(--text-dark);
}
.reviews-head { text-align: center; margin-bottom: 16px; }
.reviews-head h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: clamp(28px, 4vw, 46px);
  letter-spacing: -0.025em;
  margin-bottom: 14px;
  color: var(--text-dark);
}
.reviews-head h2 em { font-style: normal; font-weight: 500; color: var(--teal); }
.reviews-head p { font-size: 17px; color: var(--text-dark-mute); }
/* Trustpilot badge bar */
.tp-badge {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 18px 28px;
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  max-width: 420px;
  margin: 0 auto 40px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.tp-badge__label {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-dark);
}
.tp-badge__stars {
  display: flex;
  gap: 3px;
}
.tp-badge__star {
  width: 28px; height: 28px;
  background: #00b67a;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tp-badge__star svg { width: 16px; height: 16px; fill: #fff; }
.tp-badge__meta {
  font-size: 13px;
  color: var(--text-dark-mute);
  text-align: center;
  margin-top: 8px;
}
.tp-badge__tp-logo {
  display: flex;
  align-items: center;
  gap: 4px;
  font-weight: 700;
  font-size: 14px;
  color: var(--text-dark);
}
.tp-badge__tp-logo svg { width: 20px; height: 20px; }
/* Review grid */
.reviews-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}
.review-card {
  background: #fff;
  border-radius: 12px;
  padding: 22px 20px 18px;
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  display: flex;
  flex-direction: column;
}
.review-card .tp-stars {
  display: flex;
  gap: 2px;
  margin-bottom: 12px;
}
.review-card .tp-star {
  width: 22px; height: 22px;
  background: #00b67a;
  display: flex;
  align-items: center;
  justify-content: center;
}
.review-card .tp-star svg { width: 13px; height: 13px; fill: #fff; }
.review-card .rc-meta {
  font-size: 12px;
  color: var(--text-dark-mute);
  margin-bottom: 10px;
}
.review-card .rc-meta strong {
  color: var(--text-dark);
  font-weight: 600;
}
.review-card .title {
  font-weight: 700;
  font-size: 15px;
  color: var(--text-dark);
  margin-bottom: 8px;
  line-height: 1.3;
}
.review-card .body {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-dark-mute);
  flex-grow: 1;
}
@media (max-width: 1000px) {
  .reviews-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .reviews-grid { grid-template-columns: 1fr; }
}

/* X/Reddit styles removed - now using Trustpilot style */

/* ============================================================
   SECTION 12 - HOW TO USE (3 steps)
   ============================================================ */
.howto {
  padding: clamp(60px, 8vw, 110px) 0;
  background: var(--cream);
  color: var(--text-dark);
  border-top: 1px solid rgba(0,0,0,0.06);
}
.howto h2 {
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(28px, 4vw, 46px);
  letter-spacing: -0.025em;
  margin-bottom: 12px;
  text-transform: none;
}
.howto h2 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}
.howto p.sub {
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  color: var(--text-dark-mute);
  margin-bottom: 50px;
}
.howto-steps {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.howto-step {
  text-align: center;
}
.howto-img {
  aspect-ratio: 1/1;
  border-radius: var(--radius-lg);

  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.4);
  font-size: 12px;
  font-weight: 600;
  padding: 18px;
}
.howto-img .step-num {
  position: absolute;
  top: 14px;
  left: 14px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--teal), var(--teal-warm));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 16px;
  z-index: 2;
}
.howto-step h4 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 18px;
  color: var(--text-dark);
  margin-bottom: 6px;
  text-transform: none;
  letter-spacing: -0.01em;
}
.howto-step p {
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  color: var(--text-dark-mute);
}
@media (max-width: 800px) { .howto-steps { grid-template-columns: 1fr; } }

/* ============================================================
   SECTION 13 - COMPARISON TABLE
   ============================================================ */
.comparison {
  padding: clamp(60px, 8vw, 110px) 0;
  background: var(--bg);
}
.comparison-head { text-align: center; margin-bottom: 40px; }
.comparison-head h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(28px, 4vw, 46px);
  letter-spacing: -0.025em;
  margin-bottom: 14px;
  text-transform: none;
}
.comparison-head h2 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}
.comparison-head p { font-family: 'Inter', sans-serif; font-size: 18px; color: var(--text-dim); }

.comparison-table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  background: var(--surface);
  border: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
}
.comparison-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 640px;
}
.comparison-table th, .comparison-table td {
  padding: 18px 20px;
  text-align: center;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
}
.comparison-table th {
  background: var(--surface-2);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 12px;
  color: var(--text-dim);
}
.comparison-table th.us {
  background: linear-gradient(135deg, rgba(0,166,210,0.18), rgba(51,184,221,0.08));
  color: var(--teal-warm);
  border-bottom: 2px solid var(--teal);
}
.comparison-table td:first-child, .comparison-table th:first-child {
  text-align: left;
  font-weight: 600;
  color: var(--text);
}
.comparison-table td.us {
  background: rgba(0,166,210,0.06);
  color: var(--teal);
  font-weight: 600;
}
.comparison-table .check { color: var(--teal); font-size: 18px; font-weight: 600; }

    html += '<div class="editorial-image">';
    if (D.editorial.image && D.editorial.image !== '') {
      html += '<img src="' + esc(D.editorial.image) + '" alt="" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;">';
    } else {
      html += '[ EDITORIAL PHOTO ]<br>Desk \u00B7 coffee \u00B7 Genius Mind bottle<br>4:5 ratio';
    }
    html += '</div></div></div></section>';

    // ============================================================
    // SECTION 15 - SCARCITY
    // ============================================================
    html += '<section class="scarcity"><div class="container"><div class="scarcity-card">';
    html += '<div class="text">';
    html += '<h3>' + D.scarcity.headline + '</h3>';
    html += '<p>' + esc(D.scarcity.body) + '</p>';
    html += '</div>';
    html += '<a href="#pricing" class="btn">' + esc(D.scarcity.cta) + ' <span class="btn-arrow">\u2192</span></a>';
    html += '</div></div></section>';

    // ============================================================
    // SECTION 16 - REVIEW SUMMARY
    // ============================================================
    html += '<section class="review-summary"><div class="container"><div class="review-summary-card">';
    html += '<div class="summary-score">';
    html += '<div class="big">' + esc(D.review_summary.score) + '</div>';
    html += '<div class="stars">\u2605\u2605\u2605\u2605\u2605</div>';
    html += '<div class="total">' + esc(D.review_summary.total) + '</div>';
    html += '</div>';
    html += '<div class="summary-bars">';
    D.review_summary.bars.forEach(function(bar) {
      html += '<div class="bar-row"><span>' + bar.stars + '\u2605</span><div class="bar"><div class="fill" style="width:' + bar.percent + '%"></div></div><span>' + bar.percent + '%</span></div>';
    });
    html += '</div></div></div></section>';

    // ============================================================
    // SECTION 17 - PRICING
    // ============================================================
    html += '<section class="pricing" id="pricing"><div class="container">';
    html += '<div class="pricing-head">';
    html += '<span class="eyebrow">' + esc(D.pricing.eyebrow) + '</span>';
    html += '<h2>' + D.pricing.headline + '</h2>';
    html += '<p>' + esc(D.pricing.subtitle) + '</p>';
    html += '</div>';
    html += '<div class="pricing-countdown">';
    html += '<span class="label">Flash Sale Ends In:</span>';
    html += '<div class="ct-unit"><span class="num" id="pc-d">00</span><small>Days</small></div>';
    html += '<div class="ct-unit"><span class="num" id="pc-h">00</span><small>Hours</small></div>';
    html += '<div class="ct-unit"><span class="num" id="pc-m">00</span><small>Mins</small></div>';
    html += '<div class="ct-unit"><span class="num" id="pc-s">00</span><small>Secs</small></div>';
    html += '</div>';
    html += '<div class="pricing-grid">';
    D.pricing.cards.forEach(function(card, ci) {
      var isFeatured = card.featured;
      html += '<div class="price-card' + (isFeatured ? ' featured' : '') + '">';
      if (card.ribbon) {
        html += '<div class="ribbon">' + esc(card.ribbon) + '</div>';
      }
      html += '<h3>' + esc(card.title) + '</h3>';
      html += '<p class="tagline">' + esc(card.tagline) + '</p>';
      html += '<div class="product-mock">';
      if (card.image && card.image !== '') {
        html += '<img src="' + esc(card.image) + '" alt="">';
      } else {
        var bottleCount = isFeatured ? '3' : '1';
        var bottleLabel = isFeatured ? '[ 3 BOTTLES IMAGE ]' : '[ 1 BOTTLE IMAGE ]';
        html += '<span class="placeholder-label">' + bottleLabel + '</span>';
      }
      html += '</div>';
      // Price
      var priceParts = card.price.split('.');
      html += '<div class="price-row">';
      html += '<span class="now">\u00A3' + priceParts[0] + '<small style="font-size:24px;">.' + (priceParts[1] || '00') + '</small></span>';
      if (card.was) {
        html += '<span class="was">\u00A3' + esc(card.was) + '</span>';
      }
      html += '</div>';
      // Per line
      if (card.save) {
        html += '<div class="per"><strong>' + esc(card.per) + '</strong> \u00B7 ' + esc(card.save) + '</div>';
      } else {
        html += '<div class="per">' + esc(card.per) + '</div>';
      }
      // Perks
      html += '<ul class="price-perks">';
      card.perks.forEach(function(perk) {
        html += '<li>' + esc(perk) + '</li>';
      });
      html += '</ul>';
      // CTA
      var btnClass = isFeatured ? 'btn' : 'btn btn-ghost';
      html += '<a href="' + (card.url || '#') + '" class="' + btnClass + '">' + esc(card.cta) + ' <span class="btn-arrow">\u2192</span></a>';
      // Stock
      if (card.stock) {
        html += '<div class="stock-row"><strong>\u26A0 Low stock</strong> - ' + esc(card.stock.replace(/^Low stock - /, '')) + '</div>';
      }
      html += '</div>';
    });
    html += '</div></div></section>';

    // ============================================================
    // SECTION 18 - FAQ
    // ============================================================
    html += '<section class="faq" id="faq"><div class="container">';
    html += '<div class="faq-head"><h2>' + D.faq.headline + '</h2></div>';
    html += '<div class="faq-list">';
    D.faq.items.forEach(function(item) {
      html += '<div class="faq-item">';
      html += '<button class="faq-q">' + esc(item.q) + '<span class="icon">+</span></button>';
      html += '<div class="faq-a"><div class="faq-a-inner"><p>' + esc(item.a) + '</p></div></div>';
      html += '</div>';
    });
    html += '</div></div></section>';

    // ============================================================
    // SECTION 19 - DISCLAIMER
    // ============================================================
    html += '<section class="disclaimer"><div class="container">';
    D.disclaimer.paragraphs.forEach(function(p) {
      html += '<p>' + p + '</p>';
    });
    html += '<p class="copyright">' + esc(D.disclaimer.copyright) + '</p>';
    html += '</div></section>';

    // ============================================================
    // STICKY CTA BAR
    // ============================================================
    html += '<div class="sticky-cta" id="stickyCta"><div class="sticky-cta-inner">';
    html += '<div class="info">';
    html += '<div class="top">\u26A1 ' + esc(D.sticky_cta.label) + '</div>';
    html += '<div class="bot">';
    html += '<span class="price">' + esc(D.sticky_cta.price) + '</span>';
    html += '<span class="strike">' + esc(D.sticky_cta.was) + '</span>';
    html += '<span>' + esc(D.sticky_cta.description) + '</span>';
    html += '</div>';
    html += '<div class="mini-timer">Ends in <span id="sc-d">00</span>d <span id="sc-h">00</span>h <span id="sc-m">00</span>m <span id="sc-s">00</span>s</div>';
    html += '</div>';
    html += '<a href="#pricing" class="btn">' + esc(D.sticky_cta.cta) + '</a>';
    html += '</div></div>';

    // Inject into DOM
    app.innerHTML = html;

    // ====================================================================
    // HERO ROTATING WORD (Brain.fm style)
    // ====================================================================
    (function() {
      var wrapper = document.getElementById('heroRotate');
      if (!wrapper) return;
      var words = wrapper.querySelectorAll('.hero-rotate__word');
      if (words.length < 2) return;
      var current = 0;
      setInterval(function() {
        words[current].classList.remove('active');
        words[current].classList.add('exit');
        var prev = current;
        current = (current + 1) % words.length;
        words[current].classList.add('active');
        setTimeout(function() {
          words[prev].classList.remove('exit');
        }, 500);
      }, 3000);
    })();

    // ====================================================================
    // SCROLLER ARROWS + CLICK TO CHANGE HERO WORD
    // ====================================================================
    (function() {
      var track = document.getElementById('scrollTrack');
      var left = document.getElementById('scrollLeft');
      var right = document.getElementById('scrollRight');
      if (!track || !left || !right) return;
      var step = 180;
      right.addEventListener('click', function() {
        if (track.scrollLeft + track.clientWidth >= track.scrollWidth - 10) {
          track.scrollLeft = 0;
        } else {
          track.scrollLeft += step;
        }
      });
      left.addEventListener('click', function() {
        if (track.scrollLeft <= 10) {
          track.scrollLeft = track.scrollWidth;
        } else {
          track.scrollLeft -= step;
        }
      });

      // Click scroller item to change hero word
      var wrapper = document.getElementById('heroRotate');
      var words = wrapper ? wrapper.querySelectorAll('.hero-rotate__word') : [];
      var heroWordTexts = [];
      words.forEach(function(w) { heroWordTexts.push(w.textContent); });

      var scrollerItems = track.querySelectorAll('.hero-scroller__item');
      scrollerItems.forEach(function(item) {
        item.addEventListener('click', function() {
          var targetWord = this.getAttribute('data-hero-word');
          if (!targetWord) return;
          // Find matching hero word index
          var idx = -1;
          heroWordTexts.forEach(function(t, i) { if (t === targetWord) idx = i; });
          if (idx < 0) return;
          // Switch hero word
          words.forEach(function(w) { w.classList.remove('active', 'exit'); });
          words[idx].classList.add('active');
          // Update active scroller item
          scrollerItems.forEach(function(s) { s.classList.remove('active'); });
          this.classList.add('active');
        });
      });
    })();

    // ====================================================================
    // COUNTDOWN TIMER (synced across all instances - evergreen 3-day reset)
    // ====================================================================
    (function() {
      var KEY = 'gm_cd_end';
      var stored = localStorage.getItem(KEY);
      var end;
      if (stored) {
        end = new Date(parseInt(stored, 10));
        if (isNaN(end.getTime()) || end <= new Date()) {
          end = new Date(Date.now() + 3 * 86400000);
          localStorage.setItem(KEY, end.getTime());
        }
      } else {
        end = new Date(Date.now() + 3 * 86400000);
        localStorage.setItem(KEY, end.getTime());
      }

      var targets = [
        ['ab-d','ab-h','ab-m','ab-s'],
        ['pc-d','pc-h','pc-m','pc-s'],
        ['sc-d','sc-h','sc-m','sc-s']
      ];

      function pad(n) { return String(n).padStart(2, '0'); }

      function tick() {
        var diff = end - new Date();
        if (diff <= 0) {
          end = new Date(Date.now() + 3 * 86400000);
          localStorage.setItem(KEY, end.getTime());
          diff = end - new Date();
        }
        var d = Math.floor(diff / 86400000);
        var h = Math.floor((diff % 86400000) / 3600000);
        var m = Math.floor((diff % 3600000) / 60000);
        var s = Math.floor((diff % 60000) / 1000);
        var vals = [pad(d), pad(h), pad(m), pad(s)];
        targets.forEach(function(set) {
          set.forEach(function(id, i) {
            var el = document.getElementById(id);
            if (el) el.textContent = vals[i];
          });
        });
      }
      tick();
      setInterval(tick, 1000);
    })();

    // ====================================================================
    // FAQ ACCORDION
    // ====================================================================
    document.querySelectorAll('.faq-q').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var item = this.parentElement;
        var wasOpen = item.classList.contains('open');
        document.querySelectorAll('.faq-item').forEach(function(el) { el.classList.remove('open'); });
        if (!wasOpen) item.classList.add('open');
      });
    });

    // ====================================================================
    // STICKY CTA - show after user scrolls past hero
    // ====================================================================
    (function() {
      var cta = document.getElementById('stickyCta');
      var threshold = 700;
      var pricing = document.getElementById('pricing');
      function check() {
        var inPricing = false;
        if (pricing) {
          var rect = pricing.getBoundingClientRect();
          inPricing = rect.top < window.innerHeight && rect.bottom > 0;
        }
        if (window.scrollY > threshold && !inPricing) {
          cta.classList.add('visible');
        } else {
          cta.classList.remove('visible');
        }
      }
      window.addEventListener('scroll', check, { passive: true });
      check();
    })();

    // ====================================================================
    // SCROLL REVEAL
    // ====================================================================
    (function() {
      if (!('IntersectionObserver' in window)) return;
      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
          if (e.isIntersecting) {
            e.target.classList.add('in');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.12 });
      document.querySelectorAll('section > .container > *, .vs-card, .review-card, .review-card--x, .review-card--reddit, .price-card, .promise-badge, .tl-item').forEach(function(el) {
        el.classList.add('reveal');
        io.observe(el);
      });
    })();
  }

})();
</script>
