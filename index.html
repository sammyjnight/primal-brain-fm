    html += '<p style="margin-top:12px;font-size:11px;color:var(--text-mute);">*92% of users reported feeling sharper within 2\u20133 months of consistent use, based on internal customer survey data.</p>';
    html += '</div></section>';

    // ============================================================
    // STICKY CTA BAR
    // ============================================================
    html += '<div class="sticky-cta" id="stickyCta"><div class="sticky-cta-inner">';
    html += '<div class="info">';
    html += '<div class="top">\u26A1 ' + esc(D.sticky_cta.label) + '</div>';
    html += '<div class="bot">';
    html += '<span class="price">' + esc(D.sticky_cta.price) + '</span>';
    html += '<span class="strike">' + esc(D.sticky_cta.was) + '</span>';
    html += '<span>' + esc(D.sticky_cta.description) + '</span>';
    html += '</div>';
    html += '<div class="mini-timer">Ends in <span id="sc-d">00</span>d <span id="sc-h">00</span>h <span id="sc-m">00</span>m <span id="sc-s">00</span>s</div>';
    html += '</div>';
    html += '<a href="#pricing" class="btn">' + esc(D.sticky_cta.cta) + '</a>';
    html += '</div></div>';

    // Inject into DOM
    app.innerHTML = html;

    // ====================================================================
    // HERO ROTATING WORD (Brain.fm style)
    // ====================================================================
    (function() {
      var wrapper = document.getElementById('heroRotate');
      if (!wrapper) return;
      var words = wrapper.querySelectorAll('.hero-rotate__word');
      if (words.length < 2) return;
      var current = 0;
      setInterval(function() {
        words[current].classList.remove('active');
        words[current].classList.add('exit');
        var prev = current;
        current = (current + 1) % words.length;
        words[current].classList.add('active');
        setTimeout(function() {
          words[prev].classList.remove('exit');
        }, 500);
      }, 3000);
    })();

    // ====================================================================
    // CHART DRAW ANIMATION (scroll-triggered)
    // ====================================================================
    (function() {
      var charts = document.querySelectorAll('.chart-draw');
      if (!charts.length) return;
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('drawn');
            observer.unobserve(entry.target);
          }
        });
      }, {threshold: 0.3});
      charts.forEach(function(el) { observer.observe(el); });

      // Also animate comp-bar fills
      var compSection = document.querySelector('.comp-bars__title');
      if (compSection) {
        var compObs = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.parentElement.classList.add('comp-bars-drawn');
              compObs.unobserve(entry.target);
            }
          });
        }, {threshold: 0.3});
        compObs.observe(compSection);
      }
    })();

    // ====================================================================
    // COUNTUP ANIMATION
    // ====================================================================
    (function() {
      var nums = document.querySelectorAll('.countup-num');
      if (!nums.length) return;
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var el = entry.target;
            observer.unobserve(el);
            var target = parseInt(el.getAttribute('data-target'));
            var suffix = el.getAttribute('data-suffix') || '';
            var duration = 2000;
            var start = performance.now();
            function animate(now) {
              var elapsed = now - start;
              var progress = Math.min(elapsed / duration, 1);
              var eased = 1 - Math.pow(1 - progress, 3);
              el.textContent = Math.round(eased * target) + suffix;
              if (progress < 1) requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
          }
        });
      }, {threshold: 0.5});
      nums.forEach(function(el) { observer.observe(el); });
    })();

    // ====================================================================
    // INGREDIENT CAROUSEL
    // ====================================================================
    (function() {
      var carousel = document.getElementById('ingredientCarousel');
      if (!carousel) return;
      var pages = carousel.querySelectorAll('.ingredient-carousel__page');
      var dots = carousel.querySelectorAll('.ingredient-carousel__dot');
      var prev = document.getElementById('ingPrev');
      var next = document.getElementById('ingNext');
      var current = 0;
      function goTo(idx) {
        pages[current].classList.remove('active');
        dots[current].classList.remove('active');
        current = (idx + pages.length) % pages.length;
        pages[current].classList.add('active');
        dots[current].classList.add('active');
      }
      prev.addEventListener('click', function() { goTo(current - 1); });
      next.addEventListener('click', function() { goTo(current + 1); });
      dots.forEach(function(dot) {
        dot.addEventListener('click', function() { goTo(parseInt(dot.getAttribute('data-page'))); });
      });
      // Swipe support
      var startX = 0;
      carousel.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; });
      carousel.addEventListener('touchend', function(e) {
        var diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) { diff > 0 ? goTo(current + 1) : goTo(current - 1); }
      });
    })();

    // ====================================================================
    // PRICING CAROUSEL + LIGHTBOX
    // ====================================================================
    (function() {
      var wrap = document.getElementById('pricingCarousel');
      if (!wrap) return;
      var slides = wrap.querySelectorAll('.pricing-carousel__slide');
      var thumbs = wrap.querySelectorAll('.pricing-carousel__thumb');
      var current = 0;
      var len = slides.length;

      // Collect image srcs for lightbox
      var imgSrcs = [];
      slides.forEach(function(s) {
        var img = s.querySelector('img');
        imgSrcs.push(img ? img.src : '');
      });

      function goTo(idx) {
        slides[current].classList.remove('active');
        thumbs[current].classList.remove('active');
        current = ((idx % len) + len) % len;
        slides[current].classList.add('active');
        thumbs[current].classList.add('active');
      }
      thumbs.forEach(function(t, i) { t.addEventListener('click', function() { goTo(i); }); });
      var prevBtn = document.getElementById('pcPrev');
      var nextBtn = document.getElementById('pcNext');
      if (prevBtn) prevBtn.addEventListener('click', function() { goTo(current - 1); });
      if (nextBtn) nextBtn.addEventListener('click', function() { goTo(current + 1); });
      var startX = 0;
      wrap.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, {passive: true});
      wrap.addEventListener('touchend', function(e) {
        var diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) { goTo(diff > 0 ? current + 1 : current - 1); }
      });

      // LIGHTBOX
      var lb = document.createElement('div');
      lb.className = 'img-lightbox';
      lb.innerHTML = '<div class="img-lightbox__card"><button class="img-lightbox__close">&times;</button><button class="img-lightbox__nav img-lightbox__nav--prev">&#8249;</button><img src="" alt=""><button class="img-lightbox__nav img-lightbox__nav--next">&#8250;</button></div>';
      document.body.appendChild(lb);
      var lbImg = lb.querySelector('img');
      var lbIdx = 0;

      function openLightbox(idx) {
        lbIdx = idx;
        lbImg.src = imgSrcs[lbIdx];
        lb.classList.add('open');
        document.body.style.overflow = 'hidden';
      }
      function closeLightbox() {
        lb.classList.remove('open');
        document.body.style.overflow = '';
      }
      function lbGoTo(idx) {
        lbIdx = ((idx % len) + len) % len;
        lbImg.src = imgSrcs[lbIdx];
        goTo(lbIdx);
      }

      // Click slide to open lightbox
      slides.forEach(function(s, i) {
        s.addEventListener('click', function() { openLightbox(i); });
      });

      lb.querySelector('.img-lightbox__close').addEventListener('click', closeLightbox);
      lb.addEventListener('click', function(e) { if (e.target === lb) closeLightbox(); });
      lb.querySelector('.img-lightbox__nav--prev').addEventListener('click', function(e) { e.stopPropagation(); lbGoTo(lbIdx - 1); });
      lb.querySelector('.img-lightbox__nav--next').addEventListener('click', function(e) { e.stopPropagation(); lbGoTo(lbIdx + 1); });
      document.addEventListener('keydown', function(e) {
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') lbGoTo(lbIdx - 1);
        if (e.key === 'ArrowRight') lbGoTo(lbIdx + 1);
      });

      // View Nutrition Label button opens lightbox on label slide (last image)
      var labelBtn = document.querySelector('.pdp-info__label-btn');
      if (labelBtn) {
        labelBtn.onclick = function(e) {
          e.preventDefault();
          goTo(len - 1);
          openLightbox(len - 1);
        };
      }
    })();

    // ====================================================================
    // BRAIN SYSTEMS TABS
    // ====================================================================
    (function() {
      var pills = document.querySelectorAll('.brain-pill');
      var panel = document.getElementById('brainPanel');
      if (!pills.length || !panel) return;
      var systems = [
        {icon: '\uD83E\uDDE0', name: 'Cognitive Function', desc: 'Ginkgo, Bacopa, and Lion\u2019s Mane enhance blood flow, neural growth, and memory.'},
        {icon: '\u26A1', name: 'Energy & Alertness', desc: 'Guarana and B-Vitamins fuel sustained energy without crashes.'},
        {icon: '\uD83C\uDFAF', name: 'Focus & Attention', desc: 'L-Tyrosine and Choline support dopamine and acetylcholine for deep focus.'},
        {icon: '\uD83D\uDEE1\uFE0F', name: 'Stress Resilience', desc: 'Panax Ginseng and Phosphatidylserine reduce cortisol under pressure.'},
        {icon: '\uD83D\uDCDA', name: 'Memory & Recall', desc: 'Bacopa, Sage Leaf, and Zinc enhance retention and recall speed.'},
        {icon: '\uD83C\uDF3F', name: 'Neuroprotection', desc: 'Rosemary and Niacin protect brain cells and drive cellular repair.'}
      ];
      pills.forEach(function(pill) {
        pill.addEventListener('click', function() {
          var idx = parseInt(this.getAttribute('data-idx'));
          pills.forEach(function(p) { p.classList.remove('active'); });
          this.classList.add('active');
          var s = systems[idx];
          panel.innerHTML = '<div class="brain-panel__header"><span class="brain-panel__icon">' + s.icon + '</span><span class="brain-panel__name">' + s.name + '</span></div><p class="brain-panel__desc">' + s.desc + '</p>';
        });
      });
    })();

    // ====================================================================
    // SCROLLER - auto-scrolling continuous loop (independent of hero)
    // ====================================================================

    // ====================================================================
    // COUNTDOWN TIMER (synced across all instances - evergreen 3-day reset)
    // ====================================================================
    (function() {
      var KEY = 'gm_cd_end';
      var stored = localStorage.getItem(KEY);
      var end;
      if (stored) {
        end = new Date(parseInt(stored, 10));
        if (isNaN(end.getTime()) || end <= new Date()) {
          end = new Date(Date.now() + 3 * 86400000);
          localStorage.setItem(KEY, end.getTime());
        }
      } else {
        end = new Date(Date.now() + 3 * 86400000);
        localStorage.setItem(KEY, end.getTime());
      }

      var targets = [
        ['ab-d','ab-h','ab-m','ab-s'],
        ['pc-d','pc-h','pc-m','pc-s'],
        ['sc-d','sc-h','sc-m','sc-s']
      ];

      function pad(n) { return String(n).padStart(2, '0'); }

      function tick() {
        var diff = end - new Date();
        if (diff <= 0) {
          end = new Date(Date.now() + 3 * 86400000);
          localStorage.setItem(KEY, end.getTime());
          diff = end - new Date();
        }
        var d = Math.floor(diff / 86400000);
        var h = Math.floor((diff % 86400000) / 3600000);
        var m = Math.floor((diff % 3600000) / 60000);
        var s = Math.floor((diff % 60000) / 1000);
        var vals = [pad(d), pad(h), pad(m), pad(s)];
        targets.forEach(function(set) {
          set.forEach(function(id, i) {
            var el = document.getElementById(id);
            if (el) el.textContent = vals[i];
          });
        });
      }
      tick();
      setInterval(tick, 1000);
    })();

    // ====================================================================
    // FAQ ACCORDION
    // ====================================================================
    document.querySelectorAll('.faq-q').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var item = this.parentElement;
        var wasOpen = item.classList.contains('open');
        document.querySelectorAll('.faq-item').forEach(function(el) { el.classList.remove('open'); });
        if (!wasOpen) item.classList.add('open');
      });
    });

    // ====================================================================
    // STICKY CTA - show after user scrolls past hero
    // ====================================================================
    (function() {
      var cta = document.getElementById('stickyCta');
      var threshold = 700;
      var pricing = document.getElementById('pricing');
      function check() {
        var inPricing = false;
        if (pricing) {
          var rect = pricing.getBoundingClientRect();
          inPricing = rect.top < window.innerHeight && rect.bottom > 0;
        }
        if (window.scrollY > threshold && !inPricing) {
          cta.classList.add('visible');
        } else {
          cta.classList.remove('visible');
        }
      }
      window.addEventListener('scroll', check, { passive: true });
      check();
    })();

    // ====================================================================
    // SCROLL REVEAL
    // ====================================================================
    (function() {
      if (!('IntersectionObserver' in window)) return;
      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
          if (e.isIntersecting) {
            e.target.classList.add('in');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.12 });
      document.querySelectorAll('section > .container > *, .vs-card, .review-card, .review-card--x, .review-card--reddit, .price-card, .promise-badge, .tl-item').forEach(function(el) {
        el.classList.add('reveal');
        io.observe(el);
      });
    })();
  }

})();
</script>
