<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>Genius Mind by JustFloow - Cognitive Infrastructure for Operators</title>
<meta name="description" content="You know exactly what you need to do. Your brain just won't let you start. Genius Mind is a 16-ingredient nootropic stack built for founders and operators who can't afford to drop a beat after 3pm.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ====================================================================
   GENIUS MIND × CHAOS OPERATOR - PRELANDER
   Dark premium aesthetic. Mobile-first. Inspired by Primal Queen
   structure, rebuilt in Genius Mind brand language.
   ==================================================================== */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
em, i, .italic, .serif { font-style: normal !important; }

:root {
  /* Brand kit colours */
  --bg: #2a3a4e;
  --surface: #304256;
  --surface-2: #374a5e;
  --surface-3: #3e5268;
  --cream: #f5f1e8;
  --cream-warm: #faf6ec;
  --paper: #fcfcfc;

  --teal: #00A6D2;
  --teal-warm: #33B8DD;
  --teal-glow: rgba(0, 166, 210, 0.18);
  --teal-soft: rgba(0, 166, 210, 0.08);

  --text: #ffffff;
  --text-dim: #c7c7d4;
  --text-mute: #8a8aa0;
  --text-faint: #5a5a6e;

  --text-dark: #0a0a0f;
  --text-dark-mute: #4a4a58;

  --gold: #FFD700;
  --green: #22d3a0;
  --red: #E8283B;
  --teal: #00A6D2;

  --border: rgba(255,255,255,0.08);
  --border-teal: rgba(0,166,210,0.28);
  --border-strong: rgba(255,255,255,0.16);

  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 22px;
  --radius-xl: 32px;

  --shadow-sm: 0 2px 12px rgba(0,0,0,0.4);
  --shadow: 0 12px 40px rgba(0,0,0,0.5);
  --shadow-teal: 0 12px 40px rgba(0,166,210,0.35);

  --max: 1180px;
  --pad: clamp(20px, 4vw, 40px);
}

html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  font-size: 17px;
}

img { max-width: 100%; height: auto; display: block; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; font-family: inherit; background: none; color: inherit; }

.container { max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); }
.serif { font-family: 'EB Garamond', Garamond, 'Times New Roman', serif; }
.upper { text-transform: uppercase; letter-spacing: 0.04em; }
.center { text-align: center; }

/* ============================================================
   SHARED COMPONENTS
   ============================================================ */

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--teal-soft);
  border: 1px solid var(--border-teal);
  color: var(--teal-warm);
  font-size: 12px;
  font-weight: 700;
  padding: 8px 16px;
  border-radius: 50px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 22px;
}
.eyebrow::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 10px var(--teal);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.4); }
}

.h-display {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: clamp(34px, 5.6vw, 64px);
  line-height: 1.04;
  letter-spacing: -0.025em;
  text-transform: none;
}
.h-display em {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  text-transform: none;
  color: var(--teal);
  letter-spacing: -0.01em;
}

.h-editorial {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: clamp(28px, 4vw, 46px);
  line-height: 1.15;
  letter-spacing: -0.01em;
}

.h-section {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: clamp(28px, 4.4vw, 50px);
  line-height: 1.08;
  letter-spacing: -0.025em;
  text-transform: none;
}
.h-section em {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}

.subtitle {
  font-size: clamp(16px, 1.8vw, 19px);
  color: var(--text-dim);
  line-height: 1.6;
  max-width: 640px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: linear-gradient(135deg, #1bb88a 0%, #22d3a0 100%);
  color: #fff;
  font-weight: 600;
  font-size: 17px;
  padding: 18px 34px;
  border-radius: 60px;
  text-transform: none;
  letter-spacing: 0.02em;
  transition: all 0.25s ease;
  box-shadow: 0 10px 30px rgba(34,211,160,0.35);
  min-height: 56px;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.25), transparent 60%);
  opacity: 0;
  transition: opacity 0.25s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(34,211,160,0.5); }
.btn:hover::after { opacity: 1; }
.btn-arrow { font-size: 20px; transition: transform 0.25s; }
.btn:hover .btn-arrow { transform: translateX(4px); }

.btn-ghost {
  background: transparent;
  border: 1.5px solid var(--border-strong);
  color: var(--text);
  box-shadow: none;
}
.btn-ghost:hover { border-color: var(--teal); color: var(--teal); box-shadow: none; transform: none; }

.trust-pill-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-top: 22px;
}
.trust-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
}
.trust-pill .check { color: var(--teal); font-weight: 600; }

/* ============================================================
   SECTION 1 - STICKY ANNOUNCEMENT BAR (always visible)
   ============================================================ */
.announce-bar {
  display: none !important;
  position: sticky;
  top: 0;
  z-index: 100;
  background: linear-gradient(90deg, #1a0f00 0%, #2a1500 50%, #1a0f00 100%);
  border-bottom: 1px solid rgba(0,166,210,0.3);
  padding: 10px var(--pad);
  align-items: center;
  justify-content: center;
  gap: clamp(12px, 3vw, 30px);
  flex-wrap: wrap;
  font-family: 'Inter', sans-serif;
}
.announce-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 15px;
  color: var(--text);
}
.announce-logo .infinity { color: var(--teal); font-size: 20px; }
.announce-msg {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--teal-warm);
}
.announce-timer {
  display: flex;
  align-items: center;
  gap: 6px;
}
.announce-timer .label-sm {
  font-size: 11px;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-right: 6px;
}
.timer-unit {
  background: rgba(0,166,210,0.15);
  border: 1px solid rgba(0,166,210,0.35);
  color: var(--text);
  font-weight: 600;
  font-size: 13px;
  padding: 4px 8px;
  border-radius: 6px;
  min-width: 32px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.timer-unit small {
  display: block;
  font-size: 8px;
  font-weight: 600;
  color: var(--text-mute);
  text-transform: uppercase;
  margin-top: 1px;
}
@media (max-width: 600px) {
  .announce-msg { display: none; }
  .announce-bar { padding: 8px 12px; gap: 10px; }
}

/* ============================================================
   SECTION 2 - HERO
   ============================================================ */
.hero {
  position: relative;
  padding: clamp(36px, 6vw, 72px) 0 clamp(48px, 8vw, 96px);
  background:
    radial-gradient(ellipse 90% 50% at 70% 0%, rgba(0,166,210,0.18), transparent 60%),
    radial-gradient(ellipse 60% 60% at 0% 100%, rgba(0,166,210,0.08), transparent 50%),
    var(--bg);
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -100px; right: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,166,210,0.15), transparent 60%);
  filter: blur(40px);
  pointer-events: none;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: clamp(30px, 5vw, 70px);
  align-items: center;
  position: relative;
  z-index: 2;
}
.hero h1 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(38px, 6vw, 72px);
  line-height: 1.0;
  letter-spacing: -0.03em;
  text-transform: none;
  margin-bottom: 24px;
}
.hero h1 .line-2 {
  display: block;
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  text-transform: none;
  color: var(--teal-warm);
  font-size: 0.78em;
  margin-top: 8px;
  letter-spacing: -0.01em;
}
/* Rotating hero words */
.hero-rotate-wrapper {
  display: inline-block;
  position: relative;
  height: 1.15em;
  overflow: hidden;
  vertical-align: bottom;
  min-width: 280px;
}
.hero-rotate-word {
  display: block;
  position: absolute;
  left: 0;
  width: 100%;
  opacity: 0;
  transform: translateY(100%);
  transition: opacity 0.5s ease, transform 0.5s ease;
  color: var(--teal-warm);
  border-bottom: 3px solid var(--teal);
  padding-bottom: 2px;
}
.hero-rotate-word.active {
  opacity: 1;
  transform: translateY(0);
  position: relative;
}
.hero-rotate-word.exit {
  opacity: 0;
  transform: translateY(-100%);
}
.hero p.lede {
  font-family: 'Inter', sans-serif;
  font-size: clamp(17px, 1.9vw, 21px);
  line-height: 1.55;
  color: var(--text-dim);
  max-width: 560px;
  margin-bottom: 28px;
}
.hero-cta-row {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 18px;
}
.stars-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 4px;
  font-size: 14px;
  color: var(--text-dim);
}
.stars-row .stars { color: var(--gold); letter-spacing: 2px; font-size: 16px; }
.stars-row strong { color: var(--text); }

/* Hero portrait card - oval frame mirroring Primal Queen */
.hero-portrait {
  position: relative;
  aspect-ratio: 3/4;
  max-width: 560px;
  min-height: 500px;
  margin-left: auto;
  border-radius: 20px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.hero-portrait .placeholder-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-mute);
  letter-spacing: 0.05em;
  padding: 30px;
  line-height: 1.5;
}
.hero-portrait img.portrait-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
}
.hero-portrait .portrait-tag {
  position: absolute;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border-strong);
  color: var(--text);
  padding: 10px 22px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  z-index: 3;
}
.hero-portrait .floating-badge {
  position: absolute;
  top: 24px;
  right: -10px;
  width: 96px;
  height: 96px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00A6D2 0%, #33B8DD 100%);
  color: #0a0a0f;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 13px;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  line-height: 1.05;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 4px rgba(0,166,210,0.15);
  transform: rotate(-12deg);
  z-index: 4;
}
.hero-portrait .product-overlay {
  position: absolute;
  bottom: -30px; right: -20px;
  width: 140px;
  z-index: 2;
  filter: drop-shadow(0 12px 24px rgba(0,0,0,0.6));
  pointer-events: none;
}
@media (max-width: 900px) {
  .hero-grid { grid-template-columns: 1fr; gap: 36px; }
  .hero-portrait { max-width: 360px; margin: 0 auto; }
  .hero h1 { font-size: clamp(34px, 8vw, 48px); }
}

/* ============================================================
   SECTION 3 - MARQUEE STRIP
   ============================================================ */
.marquee {
  background: var(--surface);
  padding: 18px 0;
  overflow: hidden;
  position: relative;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.marquee-track {
  display: flex;
  gap: 50px;
  animation: scroll-marquee 35s linear infinite;
  white-space: nowrap;
}
@keyframes scroll-marquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
.marquee span {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  color: var(--text-dim);
  font-weight: 500;
  font-size: 15px;
  text-transform: none;
  letter-spacing: 0.02em;
  font-style: italic;
}
.marquee span::before {
  content: '·';
  color: var(--teal);
  font-size: 20px;
  font-style: normal;
}

/* ============================================================
   SECTION 4 - FOUNDER INTRO
   ============================================================ */
.founder {
  padding: clamp(60px, 8vw, 110px) 0;
  background: var(--cream);
  color: var(--text-dark);
  position: relative;
}
.founder-grid {
  display: grid;
  grid-template-columns: 0.85fr 1.15fr;
  gap: clamp(30px, 5vw, 60px);
  align-items: center;
}
.founder-photo {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: linear-gradient(135deg, #2a2a3a 0%, #1a1a24 100%);
  aspect-ratio: 3/4;
  box-shadow: var(--shadow);
}
.founder-photo .placeholder-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  padding: 24px;
  font-weight: 600;
}
.founder-photo .photo-caption {
  position: absolute;
  bottom: 18px;
  left: 18px;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(8px);
  color: #fff;
  padding: 10px 18px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.founder-content h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(32px, 4.5vw, 52px);
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  color: var(--text-dark);
}
.founder-content h2 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
}
.founder-content p.intro {
  font-family: 'Inter', sans-serif;
  font-size: 19px;
  font-style: normal;
  color: var(--text-dark-mute);
  margin-bottom: 24px;
}
.founder-issues {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px 24px;
  margin: 20px 0 28px;
}
.founder-issues li {
  list-style: none;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 16px;
  color: var(--text-dark);
}
.founder-issues li::before {
  content: '\2715';
  color: var(--teal);
  font-weight: 600;
  font-size: 14px;
  background: var(--teal-soft);
  border: 1px solid var(--border-teal);
  border-radius: 50%;
  width: 22px; height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.founder-content .body p {
  font-family: 'Inter', sans-serif;
  font-size: 17px;
  line-height: 1.65;
  color: var(--text-dark-mute);
  margin-bottom: 14px;
}
.founder-content .body p strong {
  color: var(--text-dark);
  font-weight: 700;
}
.tried-everything {
  margin-top: 28px;
  padding: 24px 28px;
  background: #fff;
  border-radius: var(--radius);
  border-left: 4px solid var(--teal);
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.tried-everything h4 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 20px;
  margin-bottom: 14px;
  color: var(--text-dark);
}
.tried-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 20px;
}
.tried-list li {
  list-style: none;
  font-size: 15px;
  color: var(--text-dark-mute);
  position: relative;
  padding-left: 20px;
}
.tried-list li::before {
  content: '\2022';
  position: absolute;
  left: 0;
  color: var(--teal);
  font-weight: 600;
}
@media (max-width: 800px) {
  .founder-grid { grid-template-columns: 1fr; }
  .founder-issues, .tried-list { grid-template-columns: 1fr; }
  .founder-photo { max-width: 360px; margin: 0 auto 24px; min-height: 300px; }
}

/* ============================================================
   SECTION 5 - WHY I BUILT IT (mirror PQ "fell in love" card)
   ============================================================ */
.why-built {
  padding: clamp(50px, 7vw, 90px) 0;
  background: var(--cream);
  color: var(--text-dark);
  position: relative;
}
.why-card {
  background: #fff;
  border-radius: 20px;
  padding: clamp(28px, 4vw, 50px);
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: none;
  position: relative;
}
.why-card h3 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(24px, 3vw, 36px);
  margin-bottom: 24px;
  color: var(--text-dark);
  line-height: 1.1;
}
.why-card h3 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
}
.why-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 36px;
  align-items: center;
}
.why-bullets li {
  list-style: none;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
  font-size: 17px;
  font-weight: 600;
  color: var(--text-dark);
}
.why-bullets li::before {
  content: '\2713';
  color: var(--teal);
  background: #f0f9fc;
  font-weight: 700;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 13px;
  margin-top: 2px;
}
.ingredient-icons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.ingredient-icon-card {
  background: #fff;
  border-radius: 12px;
  padding: 24px 8px 20px;
  text-align: center;
  border: 1px solid rgba(0,0,0,0.06);
  transition: box-shadow 0.3s;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  min-width: 0;
}
.ingredient-icon-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
.ingredient-icon-card .ico {
  width: 52px;
  height: 52px;
  margin: 0 auto 14px;
  border-radius: 50%;
  background: #f8f8f8;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--teal);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.02em;
}
.ingredient-icon-card .ico svg {
  width: 32px;
  height: 32px;
}
.ingredient-icon-card .name {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-dark);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  word-break: break-word;
  max-width: 100%;
}
@media (max-width: 800px) {

/* ============================================================
   SECTION 6 - PROBLEM (dark)
   ============================================================ */
.problem {
  padding: clamp(60px, 8vw, 110px) 0;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.problem::before {
  content: '';
  position: absolute;
  top: 50%; left: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(0,166,210,0.08), transparent 60%);
  filter: blur(60px);
  transform: translateY(-50%);
}
.problem-grid {
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: clamp(30px, 5vw, 60px);
  align-items: center;
  position: relative;
  z-index: 2;
}
.problem h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(30px, 4.4vw, 52px);
  line-height: 1.05;
  letter-spacing: -0.025em;
  text-transform: none;
  margin-bottom: 24px;
}
.problem h2 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  text-transform: none;
  color: var(--teal);
}
.problem .body p {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  line-height: 1.65;
  color: var(--text-dim);
  margin-bottom: 16px;
}
.problem-bullets {
  margin: 28px 0;
  padding: 0;
}
.problem-bullets li {
  list-style: none;
  padding: 14px 0 14px 36px;
  border-bottom: 1px solid var(--border);
  position: relative;
  font-size: 16px;
  color: var(--text);
  font-weight: 500;
}
.problem-bullets li:last-child { border-bottom: none; }
.problem-bullets li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 18px;
  width: 22px; height: 22px;
  background: var(--teal-soft);
  border: 1px solid var(--border-teal);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.problem-bullets li::after {
  content: '!';
  position: absolute;
  left: 9px; top: 17px;
  color: var(--teal);
  font-weight: 600;
  font-size: 12px;
}
.callout {
  background: linear-gradient(135deg, rgba(0,166,210,0.08), rgba(0,166,210,0.02));
  border: 1px solid var(--border-teal);
  border-left: 4px solid var(--teal);
  padding: 26px 30px;
  border-radius: var(--radius);
  margin-top: 24px;
}
.callout p {
  font-size: 16px;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.6;
}
.callout p:last-child { margin-bottom: 0; font-weight: 700; }
.problem-image {
  aspect-ratio: 4/5;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, #21212e, #0a0a0f);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-mute);
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  padding: 30px;
}
@media (max-width: 800px) {
  .problem-grid { grid-template-columns: 1fr; }
  .problem-image { max-width: 100%; margin: 0 auto; min-height: 350px; aspect-ratio: 1/1; }
}

/* ============================================================
   SECTION 7 - INGREDIENTS VS GRID (mirror PQ comparison cards)
   ============================================================ */
.ingredients {
  padding: clamp(60px, 8vw, 110px) 0;
  background: var(--cream);
  color: var(--text-dark);
  position: relative;
}
.ingredients-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: center;
  margin-bottom: 50px;
}
.ingredients-head h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(26px, 3.5vw, 40px);
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--text-dark);
  text-transform: none;
}
.ingredients-head h2 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}
.ingredients-head p {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  color: var(--text-dark-mute);
  line-height: 1.6;
}
.vs-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.vs-card {
  background: #fff;

}
.vs-card-head h4 {
  font-weight: 600;
  font-size: 15px;
  color: var(--text-dark);
  text-transform: none;
  letter-spacing: -0.01em;
}
.vs-card-head .icon-badge {
  display: none;
}
.vs-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}
.vs-side {
  text-align: center;
  padding: 16px 12px;
  border-radius: 8px;
  background: #f8f8f8;
  flex: 1;
}
.vs-side.us { background: #f0f9fc; border: none; }
.vs-side .num {
  font-weight: 600;
  font-size: 28px;
  color: var(--text-dark);
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}
.vs-side.us .num { color: var(--teal); }
.vs-side .lbl {
  display: block;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dark-mute);

}
.vs-divider {
  font-weight: 600;
  font-size: 10px;
  color: var(--text-dark-mute);

  height: auto;

  align-items: center;
  justify-content: center;
  letter-spacing: 0.08em;

}
.vs-card .vs-claim {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-dark-mute);
  text-align: center;

}
@media (max-width: 900px) {
  .vs-grid { grid-template-columns: 1fr 1fr; }
  .ingredients-head { grid-template-columns: 1fr; gap: 18px; margin-bottom: 32px; }
}
@media (max-width: 560px) {
  .vs-grid { grid-template-columns: 1fr; }
}

/* ============================================================
   SECTION 8 - BRAND PROMISE BADGES
   ============================================================ */
.promise {
  display: none !important;
  padding: clamp(40px, 5vw, 70px) 0;
  background: var(--cream);
  color: var(--text-dark);
  border-top: 1px solid rgba(0,0,0,0.06);
}
.promise h3 {
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-weight: 600;

}

  font-family: 'Inter', sans-serif;

.promise-badge:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.08); }
.promise-badge .ring {
  width: 56px;

  border: 1.5px solid rgba(0,0,0,0.12);

.promise-badge .ring svg { width: 26px; height: 26px; }
.promise-badge .label {

@media (max-width: 800px) {

}
@media (max-width: 460px) {

}

}
.facility h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: clamp(32px, 5vw, 56px);
  letter-spacing: -0.03em;
  margin-bottom: 40px;
  color: var(--text-dark);
  text-transform: none;
  line-height: 1.05;
}
.facility h2 em {
  font-family: 'Inter', sans-serif;

  font-weight: 500;
  color: var(--teal);

}
.facility-frame {
  max-width: 460px;

/* ============================================================
   SECTION 10 - TIMELINE (week-by-week)
   ============================================================ */
.timeline-section {
  padding: clamp(60px, 8vw, 110px) 0;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.timeline-section::before {
  content: '';
  position: absolute;
  top: 0; right: -150px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,166,210,0.1), transparent 60%);
  filter: blur(50px);
}
.timeline-head { text-align: center; margin-bottom: 50px; position: relative; z-index: 2; }
.timeline-head h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: clamp(30px, 4.4vw, 50px);
  letter-spacing: -0.025em;
  margin-bottom: 16px;
  text-transform: none;
}
.timeline-head h2 em {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  color: var(--teal);
  text-transform: none;
}
.timeline-head p {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  color: var(--text-dim);
  max-width: 620px;
  margin: 0 auto;
}
.timeline-layout {
  display: grid;
  grid-template-columns: 0.9fr 1.1fr;
  gap: 50px;
  align-items: flex-start;
  position: relative;
  z-index: 2;
}
.timeline-product {
  position: sticky;
  top: 100px;
  aspect-ratio: 1;
  border-radius: var(--radius-xl);
  background:
    radial-gradient(circle at 50% 50%, rgba(0,166,210,0.15), transparent 60%),
    linear-gradient(135deg, #1a1a24, #0a0a0f);
  border: 1px solid var(--border-teal);
  display: flex;
  align-items: center;
  justify-content: center;

  overflow: hidden;
}
.timeline-product img {
  width: 100%;

}
.timeline-product .placeholder-label {
  text-align: center;
  font-size: 13px;

}
.timeline-list {
  position: relative;
  padding-left: 36px;
}
.timeline-list::before {
  content: '';
  position: absolute;
  left: 12px;
  top: 12px;

.tl-item {
  position: relative;

.tl-item .period {
  display: inline-block;

}
.tl-item p {
  font-family: 'Inter', sans-serif;
  font-size: 17px;

@media (max-width: 800px) {
  .timeline-layout { grid-template-columns: 1fr; gap: 30px; }

   ============================================================ */

<script>
(function() {

  fetch('genius-mind-content.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(D) { render(D); })
    .catch(function(e) { console.error('Failed to load content JSON:', e); });

  function render(D) {
    var app = document.getElementById('app');
    var html = '';

    // Helper: generate star characters
    function stars(n) {
      var s = '';
      for (var i = 0; i < n; i++) s += '\u2605';
      return s;
    }

    // Helper: escapeHtml for text-only fields
    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;

      if (card.image && card.image !== '') {
        html += '<img src="' + esc(card.image) + '" alt="">';
      } else {
        var bottleCount = isFeatured ? '3' : '1';
        var bottleLabel = isFeatured ? '[ 3 BOTTLES IMAGE ]' : '[ 1 BOTTLE IMAGE ]';
        html += '<span class="placeholder-label">' + bottleLabel + '</span>';
      }
      html += '</div>';
      // Price
      var priceParts = card.price.split('.');
      html += '<div class="price-row">';
      html += '<span class="now">\u00A3' + priceParts[0] + '<small style="font-size:24px;">.' + (priceParts[1] || '00') + '</small></span>';
      if (card.was) {
        html += '<span class="was">\u00A3' + esc(card.was) + '</span>';
      }
      html += '</div>';
      // Per line
      if (card.save) {
        html += '<div class="per"><strong>' + esc(card.per) + '</strong> \u00B7 ' + esc(card.save) + '</div>';
      } else {
        html += '<div class="per">' + esc(card.per) + '</div>';
      }
      // Perks
      html += '<ul class="price-perks">';
      card.perks.forEach(function(perk) {
        html += '<li>' + esc(perk) + '</li>';
      });
      html += '</ul>';
      // CTA
      var btnClass = isFeatured ? 'btn' : 'btn btn-ghost';
      html += '<a href="' + (card.url || '#') + '" class="' + btnClass + '">' + esc(card.cta) + ' <span class="btn-arrow">\u2192</span></a>';
      // Stock
      if (card.stock) {
        html += '<div class="stock-row"><strong>\u26A0 Low stock</strong> - ' + esc(card.stock.replace(/^Low stock - /, '')) + '</div>';
      }
      html += '</div>';
    });
    html += '</div></div></section>';

    // ============================================================
    // SECTION 18 - FAQ
    // ============================================================
    html += '<section class="faq" id="faq"><div class="container">';
    html += '<div class="faq-head"><h2>' + D.faq.headline + '</h2></div>';
    html += '<div class="faq-list">';
    D.faq.items.forEach(function(item) {
      html += '<div class="faq-item">';
      html += '<button class="faq-q">' + esc(item.q) + '<span class="icon">+</span></button>';
      html += '<div class="faq-a"><div class="faq-a-inner"><p>' + esc(item.a) + '</p></div></div>';
      html += '</div>';
    });
    html += '</div></div></section>';

    // ============================================================
    // SECTION 19 - DISCLAIMER
    // ============================================================
    html += '<section class="disclaimer"><div class="container">';
    D.disclaimer.paragraphs.forEach(function(p) {
      html += '<p>' + p + '</p>';
    });
    html += '<p class="copyright">' + esc(D.disclaimer.copyright) + '</p>';
    html += '</div></section>';

    // ============================================================
    // STICKY CTA BAR
    // ============================================================
    html += '<div class="sticky-cta" id="stickyCta"><div class="sticky-cta-inner">';
    html += '<div class="info">';
    html += '<div class="top">\u26A1 ' + esc(D.sticky_cta.label) + '</div>';
    html += '<div class="bot">';
    html += '<span class="price">' + esc(D.sticky_cta.price) + '</span>';
    html += '<span class="strike">' + esc(D.sticky_cta.was) + '</span>';
    html += '<span>' + esc(D.sticky_cta.description) + '</span>';
    html += '</div>';
    html += '<div class="mini-timer">Ends in <span id="sc-d">00</span>d <span id="sc-h">00</span>h <span id="sc-m">00</span>m <span id="sc-s">00</span>s</div>';
    html += '</div>';
    html += '<a href="#pricing" class="btn">' + esc(D.sticky_cta.cta) + '</a>';
    html += '</div></div>';

    // Inject into DOM
    app.innerHTML = html;

    // ====================================================================
    // COUNTDOWN TIMER (synced across all instances - evergreen 3-day reset)
    // ====================================================================
    (function() {
      var KEY = 'gm_cd_end';
      var stored = localStorage.getItem(KEY);
      var end;
      if (stored) {
        end = new Date(parseInt(stored, 10));
        if (isNaN(end.getTime()) || end <= new Date()) {
          end = new Date(Date.now() + 3 * 86400000);
          localStorage.setItem(KEY, end.getTime());
        }
      } else {
        end = new Date(Date.now() + 3 * 86400000);
        localStorage.setItem(KEY, end.getTime());
      }

      var targets = [
        ['ab-d','ab-h','ab-m','ab-s'],
        ['pc-d','pc-h','pc-m','pc-s'],
        ['sc-d','sc-h','sc-m','sc-s']
      ];

      function pad(n) { return String(n).padStart(2, '0'); }

      function tick() {
        var diff = end - new Date();
        if (diff <= 0) {
          end = new Date(Date.now() + 3 * 86400000);
          localStorage.setItem(KEY, end.getTime());
          diff = end - new Date();
        }
        var d = Math.floor(diff / 86400000);
        var h = Math.floor((diff % 86400000) / 3600000);
        var m = Math.floor((diff % 3600000) / 60000);
        var s = Math.floor((diff % 60000) / 1000);
        var vals = [pad(d), pad(h), pad(m), pad(s)];
        targets.forEach(function(set) {
          set.forEach(function(id, i) {
            var el = document.getElementById(id);
            if (el) el.textContent = vals[i];
          });
        });
      }
      tick();
      setInterval(tick, 1000);
    })();

    // ====================================================================
    // FAQ ACCORDION
    // ====================================================================
    document.querySelectorAll('.faq-q').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var item = this.parentElement;
        var wasOpen = item.classList.contains('open');
        document.querySelectorAll('.faq-item').forEach(function(el) { el.classList.remove('open'); });
        if (!wasOpen) item.classList.add('open');
      });
    });

    // ====================================================================
    // STICKY CTA - show after user scrolls past hero
    // ====================================================================
    (function() {
      var cta = document.getElementById('stickyCta');
      var threshold = 700;
      var pricing = document.getElementById('pricing');
      function check() {
        var inPricing = false;
        if (pricing) {
          var rect = pricing.getBoundingClientRect();
          inPricing = rect.top < window.innerHeight && rect.bottom > 0;
        }
        if (window.scrollY > threshold && !inPricing) {
          cta.classList.add('visible');
        } else {
          cta.classList.remove('visible');
        }
      }
      window.addEventListener('scroll', check, { passive: true });
      check();
    })();

    // ====================================================================
    // SCROLL REVEAL
    // ====================================================================
    (function() {
      if (!('IntersectionObserver' in window)) return;
      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
          if (e.isIntersecting) {
            e.target.classList.add('in');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.12 });
      document.querySelectorAll('section > .container > *, .vs-card, .review-card, .review-card--x, .review-card--reddit, .price-card, .promise-badge, .tl-item').forEach(function(el) {
        el.classList.add('reveal');
        io.observe(el);
      });
    })();
  }

  // ============================================================
  // ROTATING HERO WORDS
  // ============================================================
  (function() {
    var wrapper = document.getElementById('heroRotate');
    if (!wrapper) return;
    var words = wrapper.querySelectorAll('.hero-rotate-word');
    if (words.length < 2) return;
    var current = 0;
    setInterval(function() {
      words[current].classList.remove('active');
      words[current].classList.add('exit');
      var prev = current;
      current = (current + 1) % words.length;
      words[current].classList.add('active');
      setTimeout(function() {
        words[prev].classList.remove('exit');
      }, 500);
    }, 2800);
  })();

})();
</script>
</body>
